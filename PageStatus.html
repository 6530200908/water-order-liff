<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>สถานะออเดอร์ - Water Delivery</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="Styles.css" />

  <style>
    :root{
      --bg:#05070b;
      --card:#0d1117;
      --card-2:#111827;
      --line:#253041;
      --muted:#98a2b3;
      --text:#f8fafc;
      --primary:#22d3ee;
      --primary-soft:rgba(34,211,238,.15);
      --success:#22c55e;
      --warning:#f59e0b;
      --danger:#ef4444;
      --gray:#6b7280;
      --border:rgba(255,255,255,.08);
      --shadow:0 10px 30px rgba(0,0,0,.30);
    }

    * {
      box-sizing: border-box;
      font-family: "Sarabun", sans-serif;
    }

    body {
      margin: 0;
      background:
        radial-gradient(circle at top left, rgba(34,211,238,.08), transparent 25%),
        radial-gradient(circle at top right, rgba(34,197,94,.06), transparent 20%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    #loader {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.75);
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      color: #fff;
    }

    .page-wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px 14px 60px;
    }

    .page-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      color: var(--primary);
      margin: 4px 0 18px;
      font-size: 1.6rem;
    }

    .page-subtitle {
      color: var(--muted);
      font-size: .95rem;
      margin-top: -6px;
      margin-bottom: 18px;
    }

    .glass-card {
      background: linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,.01));
      border: 1px solid var(--border);
      border-radius: 22px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .search-card {
      padding: 18px;
      margin-bottom: 18px;
    }

    .search-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: end;
    }

    .search-label {
      color: var(--muted);
      font-size: .9rem;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .search-select {
      width: 100%;
      background: rgba(255,255,255,.03);
      color: #fff;
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 14px;
      padding: 12px 14px;
      outline: none;
    }

    .search-select option {
      background: #0d1117;
      color: #fff;
    }

    .order-summary {
      padding: 22px;
      display: grid;
      grid-template-columns: 1.45fr .55fr;
      gap: 18px;
      margin-bottom: 18px;
    }

    .order-id-label,
    .label-sm {
      color: var(--muted);
      font-size: .86rem;
      font-weight: 700;
      letter-spacing: .3px;
    }

    .order-id-value {
      font-size: 2rem;
      font-weight: 800;
      line-height: 1.15;
      margin-top: 4px;
    }

    .order-items {
      font-size: 1.35rem;
      line-height: 1.45;
      font-weight: 500;
      margin-top: 4px;
    }

    .right-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      align-content: start;
    }

    .mini-box {
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 16px;
      padding: 14px;
      min-height: 84px;
    }

    .mini-box .value {
      font-size: 1rem;
      font-weight: 700;
      margin-top: 6px;
      color: #fff;
      word-break: break-word;
      white-space: normal;
    }

    .status-banner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      background: linear-gradient(180deg, rgba(34,211,238,.12), rgba(34,211,238,.05));
      border: 1px solid rgba(34,211,238,.22);
      border-radius: 18px;
      padding: 16px 18px;
      margin-bottom: 18px;
    }

    .status-banner.warning {
      background: linear-gradient(180deg, rgba(245,158,11,.15), rgba(245,158,11,.06));
      border-color: rgba(245,158,11,.25);
    }

    .status-banner.danger {
      background: linear-gradient(180deg, rgba(239,68,68,.15), rgba(239,68,68,.06));
      border-color: rgba(239,68,68,.25);
    }

    .status-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .status-icon {
      width: 54px;
      height: 54px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 16px;
      font-size: 1.5rem;
      background: rgba(255,255,255,.08);
      flex-shrink: 0;
    }

    .status-title {
      font-size: 1.15rem;
      font-weight: 800;
      margin-bottom: 2px;
    }

    .status-desc {
      color: #d6edf2;
      font-size: .95rem;
    }

    .status-banner.warning .status-desc {
      color: #fff0c2;
    }

    .status-banner.danger .status-desc {
      color: #ffd7d7;
    }

    .section-card {
      padding: 22px;
      margin-bottom: 18px;
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 18px;
    }

    .section-title h5 {
      margin: 0;
      font-size: 1.05rem;
      font-weight: 800;
    }

    .progress-wrapper {
      position: relative;
      padding: 8px 6px 0;
    }

    .progress-line {
      position: absolute;
      top: 30px;
      left: 9%;
      right: 9%;
      height: 4px;
      background: #293242;
      border-radius: 999px;
      z-index: 0;
    }

    .progress-line-fill {
      position: absolute;
      top: 30px;
      left: 9%;
      height: 4px;
      width: 0%;
      background: linear-gradient(90deg, var(--success), var(--primary));
      border-radius: 999px;
      z-index: 1;
      transition: width .35s ease;
    }

    .progress-steps {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      position: relative;
      z-index: 2;
    }

    .progress-step {
      flex: 1;
      text-align: center;
      min-width: 0;
    }

    .progress-icon {
      width: 52px;
      height: 52px;
      margin: 0 auto 10px;
      border-radius: 50%;
      border: 2px solid #3c4758;
      background: #111826;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.25rem;
      color: #94a3b8;
      transition: .25s ease;
    }

    .progress-step.done .progress-icon {
      background: rgba(34,197,94,.12);
      border-color: var(--success);
      color: var(--success);
      box-shadow: 0 0 0 6px rgba(34,197,94,.08);
    }

    .progress-step.active .progress-icon {
      background: rgba(34,211,238,.12);
      border-color: var(--primary);
      color: var(--primary);
      box-shadow: 0 0 18px rgba(34,211,238,.45);
      animation: pulseGlow 1.8s infinite;
    }

    @keyframes pulseGlow {
      0% { box-shadow: 0 0 0 0 rgba(34,211,238,.35); }
      70% { box-shadow: 0 0 0 12px rgba(34,211,238,0); }
      100% { box-shadow: 0 0 0 0 rgba(34,211,238,0); }
    }

    .progress-label {
      font-size: .94rem;
      font-weight: 700;
      line-height: 1.3;
      color: #cbd5e1;
    }

    .progress-time {
      font-size: .78rem;
      color: var(--muted);
      margin-top: 4px;
      min-height: 18px;
    }

    .progress-step.future .progress-label,
    .progress-step.future .progress-time {
      color: #7b8798;
    }

    .timeline {
      position: relative;
      padding-left: 14px;
    }

    .timeline::before {
      content: "";
      position: absolute;
      left: 13px;
      top: 0;
      bottom: 0;
      width: 2px;
      background: linear-gradient(to bottom, rgba(34,211,238,.35), rgba(255,255,255,.08));
    }

    .t-item {
      position: relative;
      padding-left: 38px;
      padding-bottom: 18px;
    }

    .t-dot {
      position: absolute;
      left: 0;
      top: 2px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 2px solid #4b5563;
      background: #0b1220;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #94a3b8;
      font-size: .88rem;
      z-index: 2;
    }

    .t-item.done .t-dot {
      border-color: var(--success);
      color: var(--success);
      background: rgba(34,197,94,.12);
    }

    .t-item.active .t-dot {
      border-color: var(--primary);
      color: var(--primary);
      background: rgba(34,211,238,.12);
      box-shadow: 0 0 16px rgba(34,211,238,.35);
    }

    .t-content {
      background: rgba(255,255,255,.025);
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 16px;
      padding: 12px 16px;
    }

    .t-item.active .t-content {
      border-color: rgba(34,211,238,.25);
      background: linear-gradient(180deg, rgba(34,211,238,.08), rgba(255,255,255,.025));
    }

    .t-head {
      display: flex;
      align-items: start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 4px;
    }

    .t-title {
      font-weight: 800;
      font-size: 1rem;
      margin: 0;
    }

    .t-badge {
      font-size: .72rem;
      font-weight: 700;
      padding: 4px 10px;
      border-radius: 999px;
      white-space: nowrap;
      border: 1px solid transparent;
    }

    .badge-done {
      background: rgba(34,197,94,.12);
      color: #86efac;
      border-color: rgba(34,197,94,.25);
    }

    .badge-active {
      background: rgba(34,211,238,.12);
      color: #67e8f9;
      border-color: rgba(34,211,238,.25);
    }

    .badge-future {
      background: rgba(255,255,255,.06);
      color: #cbd5e1;
      border-color: rgba(255,255,255,.08);
    }

    .t-desc {
      color: #d5dde8;
      font-size: .94rem;
      line-height: 1.5;
      margin-bottom: 0;
    }

    .action-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .btn-soft-info {
      background: rgba(34,211,238,.12);
      color: #67e8f9;
      border: 1px solid rgba(34,211,238,.28);
    }

    .btn-soft-warning {
      background: rgba(245,158,11,.12);
      color: #fcd34d;
      border: 1px solid rgba(245,158,11,.28);
    }

    .btn-soft-danger {
      background: rgba(239,68,68,.12);
      color: #fca5a5;
      border: 1px solid rgba(239,68,68,.28);
    }

    .btn-soft-info:hover,
    .btn-soft-warning:hover,
    .btn-soft-danger:hover {
      color: #fff;
      transform: translateY(-1px);
    }

    .empty-box {
      text-align: center;
      padding: 50px 20px;
      color: var(--muted);
    }

    .empty-icon {
      font-size: 3rem;
      margin-bottom: 10px;
    }

    .footer-note {
      color: var(--muted);
      font-size: .88rem;
      text-align: center;
      margin-top: 6px;
    }

    @media (max-width: 900px) {
      .order-summary {
        grid-template-columns: 1fr;
      }

      .status-banner {
        flex-direction: column;
        align-items: flex-start;
      }
    }

    @media (max-width: 768px) {
      .page-title {
        font-size: 1.35rem;
      }

      .order-id-value {
        font-size: 1.65rem;
      }

      .order-items {
        font-size: 1.08rem;
      }

      .right-grid {
        grid-template-columns: 1fr 1fr;
      }

      .search-row {
        grid-template-columns: 1fr;
      }

      .progress-wrapper {
        overflow-x: auto;
        padding-bottom: 8px;
      }

      .progress-steps {
        min-width: 700px;
      }
    }

    @media (max-width: 520px) {
      .section-card,
      .order-summary,
      .search-card {
        padding: 16px;
      }

      .right-grid {
        grid-template-columns: 1fr;
      }

      .status-title {
        font-size: 1rem;
      }

      .status-desc {
        font-size: .9rem;
      }
    }
  </style>
</head>
<body>
  <div id="loader">
    <div class="spinner-border text-info"></div>
    <div>กำลังโหลดสถานะออเดอร์...</div>
  </div>

  <div id="page-status" class="page-wrap" style="display:none;">
    <div class="page-title">📦 ติดตามออเดอร์</div>
    <div class="page-subtitle">ตรวจสอบสถานะคำสั่งซื้อและความคืบหน้าล่าสุดของคุณ</div>

    <div id="search-area"></div>
    <div id="content-area"></div>

    <div class="footer-note">ข้อมูลสถานะอาจมีการเปลี่ยนแปลงตามระบบร้านค้า</div>
  </div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="Config.js"></script>

  <script>
    const MAIN_STEPS = [
      {
        key: "รอยืนยันออเดอร์",
        icon: "📦",
        title: "รับออเดอร์",
        desc: "ระบบได้รับคำสั่งซื้อของคุณแล้ว และกำลังรอร้านยืนยันรายการ"
      },
      {
        key: "รอตรวจสอบสลิป",
        icon: "🧾",
        title: "ตรวจสอบสลิป",
        desc: "ร้านได้รับหลักฐานการชำระเงินแล้ว และกำลังตรวจสอบข้อมูล"
      },
      {
        key: "ชำระเงินแล้ว",
        icon: "💳",
        title: "ชำระเงินแล้ว",
        desc: "ยืนยันการชำระเงินเรียบร้อย กำลังเตรียมสินค้า"
      },
      {
        key: "รอจัดส่ง",
        icon: "🛵",
        title: "กำลังจัดส่ง",
        desc: "ออเดอร์ของคุณพร้อมจัดส่งแล้ว กรุณารอไรเดอร์ดำเนินการ"
      },
      {
        key: "จัดส่งสำเร็จ",
        icon: "✅",
        title: "จัดส่งสำเร็จ",
        desc: "ออเดอร์ของคุณถูกจัดส่งเรียบร้อยแล้ว ขอบคุณที่ใช้บริการ"
      }
    ];

    const SPECIAL_STATUS = {
      "ยกเลิก": {
        type: "danger",
        icon: "❌",
        title: "ออเดอร์ถูกยกเลิก",
        desc: "ออเดอร์นี้ถูกยกเลิกแล้ว หากมีข้อสงสัยกรุณาติดต่อร้าน"
      },
      "สลิปไม่ถูกต้อง": {
        type: "warning",
        icon: "⚠️",
        title: "สลิปไม่ถูกต้อง",
        desc: "ระบบตรวจสอบสลิปไม่ผ่าน กรุณาอัปโหลดสลิปใหม่อีกครั้ง"
      }
    };

    let allOrders = [];
    let currentOrderId = "";

    function safeText(value, fallback = "-") {
      if (value === undefined || value === null || String(value).trim() === "") return fallback;
      return String(value).trim();
    }

    function formatDateTime(value) {
      if (!value) return "-";

      const raw = String(value).trim();

      const thaiMatch = raw.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4}),?\s*(\d{1,2}):(\d{2})(?::(\d{2}))?$/);
      if (thaiMatch) {
        const [, d, m, y, hh, mm, ss] = thaiMatch;
        return `${d.padStart(2, "0")}/${m.padStart(2, "0")}/${y} ${hh.padStart(2, "0")}:${mm}${ss ? ":" + ss : ""}`;
      }

      const date = new Date(raw);
      if (!isNaN(date.getTime())) {
        return new Intl.DateTimeFormat("th-TH", {
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
          hour12: false
        }).format(date);
      }

      return raw;
    }

    function formatPrice(value) {
      const num = Number(String(value).replace(/[^\d.-]/g, ""));
      if (isNaN(num)) return "-";
      return `${num.toLocaleString("th-TH")} บาท`;
    }

    function getOrderNum(orderId) {
      return parseInt(String(orderId).match(/\d+/)?.[0] || "0", 10);
    }

    function getStatusVisual(status) {
      const normalized = safeText(status, "");
      if (SPECIAL_STATUS[normalized]) return SPECIAL_STATUS[normalized];

      const map = {
        "รอยืนยันออเดอร์": {
          type: "info",
          icon: "📦",
          title: "รอยืนยันออเดอร์",
          desc: "ระบบรับคำสั่งซื้อแล้ว กำลังรอร้านตรวจสอบรายการ"
        },
        "รอตรวจสอบสลิป": {
          type: "info",
          icon: "🧾",
          title: "รอตรวจสอบสลิป",
          desc: "ร้านได้รับสลิปของคุณแล้ว และกำลังตรวจสอบข้อมูล"
        },
        "ชำระเงินแล้ว": {
          type: "info",
          icon: "💳",
          title: "ชำระเงินแล้ว",
          desc: "ตรวจสอบการชำระเงินสำเร็จ กำลังเตรียมสินค้า"
        },
        "รอจัดส่ง": {
          type: "info",
          icon: "🛵",
          title: "รอจัดส่ง",
          desc: "ออเดอร์ของคุณกำลังอยู่ในขั้นตอนเตรียมจัดส่ง"
        },
        "จัดส่งสำเร็จ": {
          type: "success",
          icon: "✅",
          title: "จัดส่งสำเร็จ",
          desc: "จัดส่งสินค้าสำเร็จเรียบร้อยแล้ว"
        }
      };

      return map[normalized] || {
        type: "info",
        icon: "📌",
        title: normalized || "ไม่ทราบสถานะ",
        desc: "ไม่พบคำอธิบายสถานะ"
      };
    }

    function getActionButtons(status) {
      const s = safeText(status, "");
      const buttons = [];

      if (s === "สลิปไม่ถูกต้อง") {
        buttons.push(`<button class="btn btn-soft-warning" onclick="alert('เชื่อมปุ่มอัปโหลดสลิปใหม่ได้ตรงนี้')">อัปโหลดสลิปใหม่</button>`);
      }

      if (s === "รอจัดส่ง") {
        buttons.push(`<button class="btn btn-soft-info" onclick="alert('เชื่อมปุ่มติดต่อร้านได้ตรงนี้')">ติดต่อร้าน</button>`);
      }

      if (s === "จัดส่งสำเร็จ") {
        buttons.push(`<button class="btn btn-soft-info" onclick="location.reload()">สั่งใหม่</button>`);
      }

      if (s === "ยกเลิก") {
        buttons.push(`<button class="btn btn-soft-danger" onclick="alert('เชื่อมปุ่มติดต่อร้านได้ตรงนี้')">ติดต่อร้าน</button>`);
      }

      buttons.push(`<button class="btn btn-outline-light" onclick="location.reload()">รีเฟรช</button>`);
      return buttons.join("");
    }

    function normalizeOrder(rawOrder) {
      return {
        id: rawOrder?.id || rawOrder?.order_id || "-",
        items: rawOrder?.items || rawOrder?.bland || "-",
        total: rawOrder?.total || "",
        locat: rawOrder?.locat || rawOrder?.location || rawOrder?.address || "",
        time: rawOrder?.time || rawOrder?.createdAt || "-",
        status: rawOrder?.status || "-"
      };
    }

    function renderSearchBox() {
      const options = allOrders.map(order => {
        const selected = order.id === currentOrderId ? "selected" : "";
        return `<option value="${order.id}" ${selected}>${order.id}</option>`;
      }).join("");

      return `
        <div class="glass-card search-card">
          <div class="search-row">
            <div>
              <div class="search-label">ค้นหาออเดอร์ด้วย Order ID</div>
              <select id="orderSelect" class="search-select" onchange="handleOrderChange(this.value)">
                ${options}
              </select>
            </div>
            <button class="btn btn-outline-info" onclick="renderSelectedOrder()">ค้นหา</button>
          </div>
        </div>
      `;
    }

    function renderOrderSummary(order, currentStatus) {
      return `
        <div class="glass-card order-summary">
          <div>
            <div class="order-id-label">ORDER ID</div>
            <div class="order-id-value">${safeText(order.id)}</div>

            <div class="label-sm mt-4">รายการสินค้า</div>
            <div class="order-items">${safeText(order.items)}</div>
          </div>

          <div class="right-grid">
            <div class="mini-box">
              <div class="label-sm">สถานะล่าสุด</div>
              <div class="value">${safeText(currentStatus)}</div>
            </div>

            <div class="mini-box">
              <div class="label-sm">เวลาสั่งซื้อ</div>
              <div class="value">${formatDateTime(order.time)}</div>
            </div>

            <div class="mini-box">
              <div class="label-sm">ราคา</div>
              <div class="value">${formatPrice(order.total)}</div>
            </div>

            <div class="mini-box">
              <div class="label-sm">ที่อยู่จัดส่ง</div>
              <div class="value">${safeText(order.locat)}</div>
            </div>
          </div>
        </div>
      `;
    }

    function renderStatusBanner(currentStatus) {
      const visual = getStatusVisual(currentStatus);
      const extraClass = visual.type === "warning" ? "warning" : visual.type === "danger" ? "danger" : "";

      return `
        <div class="status-banner ${extraClass}">
          <div class="status-left">
            <div class="status-icon">${visual.icon}</div>
            <div>
              <div class="status-title">${visual.title}</div>
              <div class="status-desc">${visual.desc}</div>
            </div>
          </div>
        </div>
      `;
    }

    function renderProgress(currentStatus) {
      let activeIndex = MAIN_STEPS.findIndex(step => step.key === currentStatus);

      if (currentStatus === "สลิปไม่ถูกต้อง") activeIndex = 1;
      if (currentStatus === "ยกเลิก") activeIndex = 0;
      if (activeIndex < 0) activeIndex = 0;

      const fillPercent = (activeIndex / (MAIN_STEPS.length - 1)) * 100;

      const stepsHtml = MAIN_STEPS.map((step, index) => {
        let cls = "future";
        let timeText = "";

        if (index < activeIndex) cls = "done";
        else if (index === activeIndex) cls = "active";

        if (index < activeIndex) timeText = "เสร็จสิ้นแล้ว";
        else if (index === activeIndex) timeText = "สถานะปัจจุบัน";

        return `
          <div class="progress-step ${cls}">
            <div class="progress-icon">${step.icon}</div>
            <div class="progress-label">${step.title}</div>
            <div class="progress-time">${timeText}</div>
          </div>
        `;
      }).join("");

      return `
        <div class="glass-card section-card">
          <div class="section-title">
            <h5>ภาพรวมสถานะออเดอร์</h5>
          </div>

          <div class="progress-wrapper">
            <div class="progress-line"></div>
            <div class="progress-line-fill" style="width:${fillPercent}%"></div>
            <div class="progress-steps">
              ${stepsHtml}
            </div>
          </div>
        </div>
      `;
    }

    function renderTimeline(currentStatus) {
      let activeIndex = MAIN_STEPS.findIndex(step => step.key === currentStatus);

      if (currentStatus === "สลิปไม่ถูกต้อง") activeIndex = 1;
      if (currentStatus === "ยกเลิก") activeIndex = 0;
      if (activeIndex < 0) activeIndex = 0;

      const timelineHtml = MAIN_STEPS.map((step, index) => {
        let cls = "";
        let badgeClass = "badge-future";
        let badgeText = "รอดำเนินการ";
        let dotIcon = "•";

        if (index < activeIndex) {
          cls = "done";
          badgeClass = "badge-done";
          badgeText = "เสร็จสิ้นแล้ว";
          dotIcon = "✓";
        } else if (index === activeIndex) {
          cls = "active";
          badgeClass = "badge-active";
          badgeText = "สถานะปัจจุบัน";
          dotIcon = "●";
        }

        return `
          <div class="t-item ${cls}">
            <div class="t-dot">${dotIcon}</div>
            <div class="t-content">
              <div class="t-head">
                <div class="t-title">${step.icon} ${step.title}</div>
                <div class="t-badge ${badgeClass}">${badgeText}</div>
              </div>
              <div class="t-desc">${step.desc}</div>
            </div>
          </div>
        `;
      }).join("");

      let specialBox = "";
      if (SPECIAL_STATUS[currentStatus]) {
        const sp = SPECIAL_STATUS[currentStatus];
        const specialClass = sp.type === "warning" ? "warning" : "danger";
        specialBox = `
          <div class="status-banner ${specialClass}" style="margin-top:14px; margin-bottom:0;">
            <div class="status-left">
              <div class="status-icon">${sp.icon}</div>
              <div>
                <div class="status-title">${sp.title}</div>
                <div class="status-desc">${sp.desc}</div>
              </div>
            </div>
          </div>
        `;
      }

      return `
        <div class="glass-card section-card">
          <div class="section-title">
            <h5>รายละเอียดการติดตาม</h5>
          </div>

          <div class="timeline">
            ${timelineHtml}
          </div>

          ${specialBox}

          <div class="action-row">
            ${getActionButtons(currentStatus)}
          </div>
        </div>
      `;
    }

    function renderEmptyState() {
      return `
        <div class="glass-card empty-box">
          <div class="empty-icon">📭</div>
          <h4 class="mb-2">ไม่พบข้อมูลออเดอร์</h4>
          <div class="mb-3">ยังไม่มีคำสั่งซื้อที่สามารถติดตามได้ในขณะนี้</div>
          <button class="btn btn-outline-info" onclick="location.reload()">รีเฟรช</button>
        </div>
      `;
    }

    function handleOrderChange(orderId) {
      currentOrderId = orderId;
      renderSelectedOrder();
    }

    function renderSelectedOrder() {
      const contentArea = document.getElementById("content-area");
      const searchArea = document.getElementById("search-area");

      searchArea.innerHTML = renderSearchBox();

      const found = allOrders.find(order => order.id === currentOrderId) || allOrders[0];
      if (!found) {
        contentArea.innerHTML = renderEmptyState();
        return;
      }

      currentOrderId = found.id;
      const currentStatus = safeText(found.status);

      let html = "";
      html += renderOrderSummary(found, currentStatus);
      html += renderStatusBanner(currentStatus);
      html += renderProgress(currentStatus);
      html += renderTimeline(currentStatus);

      contentArea.innerHTML = html;
    }

    async function init() {
      const loader = document.getElementById("loader");
      const page = document.getElementById("page-status");
      const contentArea = document.getElementById("content-area");

      try {
        await liff.init({ liffId: CONFIG.LIFF_ID_STATUS });
        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        const profile = await liff.getProfile();
        const url = `${CONFIG.GAS_API}?type=status&uid=${encodeURIComponent(profile.userId)}`;
        const res = await fetch(url).then(r => r.json());

        const ordersRaw = Array.isArray(res?.orders) ? res.orders : (res?.order ? [res.order] : []);

        allOrders = ordersRaw
          .map(normalizeOrder)
          .sort((a, b) => getOrderNum(b.id) - getOrderNum(a.id));

        if (!allOrders.length) {
          contentArea.innerHTML = renderEmptyState();
          page.style.display = "block";
          return;
        }

        currentOrderId = allOrders[0].id;
        renderSelectedOrder();
        page.style.display = "block";

      } catch (error) {
        console.error(error);
        contentArea.innerHTML = `
          <div class="glass-card empty-box">
            <div class="empty-icon">⚠️</div>
            <h4 class="mb-2">เกิดข้อผิดพลาดในการโหลดข้อมูล</h4>
            <div class="mb-3">กรุณาลองใหม่อีกครั้ง</div>
            <button class="btn btn-outline-info" onclick="location.reload()">รีเฟรช</button>
          </div>
        `;
        page.style.display = "block";
      } finally {
        loader.style.display = "none";
      }
    }

    window.handleOrderChange = handleOrderChange;
    window.renderSelectedOrder = renderSelectedOrder;
    window.onload = init;
  </script>
</body>
</html>
