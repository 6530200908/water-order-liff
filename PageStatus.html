<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>สถานะออเดอร์</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
  background:#05070b;
  color:#fff;
  font-family:'Sarabun',sans-serif;
}

.page{
  max-width:1000px;
  margin:auto;
  padding:20px;
}

.cardx{
  background:#0d1117;
  border-radius:20px;
  padding:20px;
  margin-bottom:20px;
  border:1px solid rgba(255,255,255,0.08);
}

.title{
  color:#22d3ee;
  font-weight:bold;
  font-size:1.5rem;
  margin-bottom:10px;
}

.order-grid{
  display:grid;
  grid-template-columns:1.4fr .6fr;
  gap:15px;
}

.right-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.box{
  background:#111827;
  padding:12px;
  border-radius:12px;
}

.label{
  color:#999;
  font-size:.8rem;
}

.value{
  font-weight:bold;
}

/* STATUS */
.status{
  display:flex;
  align-items:center;
  gap:15px;
  background:rgba(34,211,238,.1);
  border:1px solid rgba(34,211,238,.3);
  padding:15px;
  border-radius:15px;
}

.icon{
  font-size:1.5rem;
}

/* PROGRESS */
.progressx{
  display:flex;
  justify-content:space-between;
  position:relative;
}

.progressx::before{
  content:"";
  position:absolute;
  top:25px;
  left:10%;
  width:80%;
  height:3px;
  background:#333;
}

.step{
  text-align:center;
  width:20%;
}

.circle{
  width:45px;
  height:45px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:auto;
  border:2px solid #555;
}

.done .circle{
  border-color:#22c55e;
  color:#22c55e;
}

.active .circle{
  border-color:#22d3ee;
  color:#22d3ee;
  box-shadow:0 0 10px #22d3ee;
}

.timeline{
  border-left:2px solid #22d3ee;
  padding-left:20px;
}

.item{
  margin-bottom:15px;
}

.badge{
  font-size:.7rem;
}
</style>
</head>

<body>

<div id="loader" style="text-align:center;margin-top:50px;">
  ⏳ กำลังโหลด...
</div>

<div id="app" class="page" style="display:none;"></div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script src="Config.js"></script>

<script>
const steps = [
 "รอยืนยันออเดอร์",
 "รอตรวจสอบสลิป",
 "ชำระเงินแล้ว",
 "รอจัดส่ง",
 "จัดส่งสำเร็จ"
];

function safe(v){ return v && v !== "-" ? v : "" }

function render(order){

 let idx = steps.indexOf(order.status);
 if(order.status==="สลิปไม่ถูกต้อง") idx=1;
 if(order.status==="ยกเลิก") idx=0;

 let rightBoxes = `
   <div class="box">
     <div class="label">สถานะล่าสุด</div>
     <div class="value">${order.status}</div>
   </div>

   <div class="box">
     <div class="label">เวลาสั่งซื้อ</div>
     <div class="value">${order.time}</div>
   </div>
 `;

 if(safe(order.total)){
   rightBoxes += `
   <div class="box">
     <div class="label">ยอดรวม</div>
     <div class="value">${order.total} บาท</div>
   </div>`;
 }

 if(safe(order.locat)){
   rightBoxes += `
   <div class="box">
     <div class="label">ที่อยู่จัดส่ง</div>
     <div class="value">${order.locat}</div>
   </div>`;
 }

 let progressHTML = steps.map((s,i)=>{
   let cls="";
   if(i<idx) cls="done";
   else if(i===idx) cls="active";

   return `
   <div class="step ${cls}">
     <div class="circle">${i+1}</div>
     <div>${s}</div>
   </div>`;
 }).join("");

 let timelineHTML = steps.map((s,i)=>{
   let badge = "รอดำเนินการ";
   if(i<idx) badge="เสร็จแล้ว";
   if(i===idx) badge="ปัจจุบัน";

   return `
   <div class="item">
     <b>${s}</b>
     <span class="badge bg-secondary">${badge}</span>
   </div>`;
 }).join("");

 document.getElementById("app").innerHTML = `
   <div class="title">📦 ติดตามออเดอร์</div>

   <div class="cardx order-grid">
     <div>
       <div class="label">ORDER ID</div>
       <div style="font-size:2rem;font-weight:bold">${order.id}</div>

       <div class="label mt-3">สินค้า</div>
       <div>${order.items}</div>
     </div>

     <div class="right-grid">
       ${rightBoxes}
     </div>
   </div>

   <div class="status">
     <div class="icon">🛵</div>
     <div>
       <b>${order.status}</b><br>
       ออเดอร์ของคุณกำลังดำเนินการ
     </div>
   </div>

   <div class="cardx">
     <div class="progressx">
       ${progressHTML}
     </div>
   </div>

   <div class="cardx">
     <div class="timeline">
       ${timelineHTML}
     </div>
   </div>
 `;
}

async function init(){
 await liff.init({ liffId: CONFIG.LIFF_ID_STATUS });

 if(!liff.isLoggedIn()){
   liff.login();
   return;
 }

 const profile = await liff.getProfile();

 const res = await fetch(`${CONFIG.GAS_API}?type=status&uid=${profile.userId}`)
 .then(r=>r.json());

 if(!res.order){
   document.getElementById("app").innerHTML="ไม่พบข้อมูล";
 }else{
   render({
     id: res.order.order_id,
     items: res.order.bland,
     total: res.order.total,
     locat: res.order.locat,
     time: res.order.time,
     status: res.order.status
   });
 }

 document.getElementById("loader").style.display="none";
 document.getElementById("app").style.display="block";
}

init();
</script>

</body>
</html>
