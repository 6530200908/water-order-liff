<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ติดตามออเดอร์</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
  background:#05070b;
  color:#fff;
  font-family:Sarabun;
}

.card-dark{
  background:#0d1117;
  border-radius:18px;
  padding:18px;
  margin-bottom:16px;
  border:1px solid rgba(255,255,255,.05);
}

.select-dark{
  background:#0d1117;
  color:#fff;
  border:1px solid rgba(255,255,255,.1);
  border-radius:12px;
  padding:10px;
  width:100%;
}

.label{
  color:#888;
  font-size:12px;
}

.value{
  font-weight:bold;
}

</style>
</head>

<body>

<div class="container py-3">

<h4 class="mb-3 text-info">📦 ติดตามออเดอร์</h4>

<!-- SEARCH -->
<div id="searchBox"></div>

<!-- CONTENT -->
<div id="content"></div>

</div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script src="Config.js"></script>

<script>

let allOrders = []
let currentOrderId = ""

/* =========================
   🔥 SORT FIX (แก้มั่ว)
========================= */
const getOrderNum = id => parseInt(id.match(/\d+/)?.[0] || 0)

/* =========================
   FORMAT
========================= */
function formatPrice(v){
  const n = Number(v)
  if(isNaN(n)) return "-"
  return n.toLocaleString("th-TH")+" บาท"
}

/* =========================
   SEARCH UI
========================= */
function renderSearch(){

  const options = allOrders.map(o=>`
    <option value="${o.id}" ${o.id===currentOrderId?"selected":""}>
      ${o.id}
    </option>
  `).join("")

  document.getElementById("searchBox").innerHTML = `
    <div class="card-dark">
      <div class="label mb-2">ค้นหา Order ID</div>
      <select class="select-dark" onchange="changeOrder(this.value)">
        ${options}
      </select>
    </div>
  `
}

/* =========================
   CONTENT
========================= */
function renderContent(){

  const order = allOrders.find(o=>o.id===currentOrderId)
  if(!order) return

  document.getElementById("content").innerHTML = `

    <div class="card-dark">
      <div class="label">ORDER ID</div>
      <div class="value fs-4">${order.id}</div>

      <div class="label mt-3">รายการสินค้า</div>
      <div>${order.items}</div>
    </div>

    <div class="card-dark">
      <div class="row">

        <div class="col-6 mb-3">
          <div class="label">สถานะ</div>
          <div class="value">${order.status}</div>
        </div>

        <div class="col-6 mb-3">
          <div class="label">เวลา</div>
          <div>${order.time}</div>
        </div>

        <div class="col-6 mb-3">
          <div class="label">ราคา</div>
          <div>${formatPrice(order.total)}</div>
        </div>

        <div class="col-6 mb-3">
          <div class="label">ที่อยู่</div>
          <div>${order.locat || "-"}</div>
        </div>

      </div>
    </div>

  `
}

/* =========================
   CHANGE ORDER
========================= */
function changeOrder(id){
  currentOrderId = id
  renderSearch()
  renderContent()
}

/* =========================
   INIT
========================= */
async function init(){

  await liff.init({ liffId: CONFIG.LIFF_ID_STATUS })
  if(!liff.isLoggedIn()){
    liff.login()
    return
  }

  const profile = await liff.getProfile()

  const res = await fetch(
    `${CONFIG.GAS_API}?type=status&uid=${profile.userId}`
  ).then(r=>r.json())

  /* =========================
     🔥 FIX SORT ตรงนี้
  ========================= */
  allOrders = (res.orders || []).map(o=>({
    id:o.id,
    items:o.items,
    total:o.total,
    locat:o.locat,
    time:o.time,
    status:o.status
  }))
  .sort((a,b)=> getOrderNum(b.id) - getOrderNum(a.id))

  currentOrderId = allOrders[0]?.id

  renderSearch()
  renderContent()
}

window.onload = init

</script>

</body>
</html>
