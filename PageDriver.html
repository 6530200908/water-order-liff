<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>รายการจัดส่งน้ำ - Water Delivery</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="Styles.css">

<style>
.modal-full{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.9);
z-index:1000;
padding:20px;
overflow-y:auto;
}

.preview-box{
width:100%;
height:200px;
background:#000;
border-radius:10px;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
border:1px dashed #3f444a;
}

#driver-preview{
width:100%;
height:100%;
object-fit:cover;
}

/* 🔥 หัวหมวด (ที่อยู่จัดส่ง) ใหม่ */
.location-group-header{
background:linear-gradient(135deg, rgba(13,202,240,0.22), rgba(13,202,240,0.08));
border:2px solid #16d4ff;
border-left:8px solid #16d4ff;
border-radius:18px;
padding:18px 18px 16px;
margin-bottom:16px;
box-shadow:
0 0 0 1px rgba(255,255,255,0.03) inset,
0 8px 24px rgba(13,202,240,0.12);
}

.location-group-title{
color:#35dcff;
font-weight:700;
font-size:1.45rem;
margin:0;
text-shadow:0 0 10px rgba(13,202,240,0.18);
}

.location-group-sub{
color:#d7e1e8;
font-size:1rem;
margin-top:8px;
font-weight:500;
}
</style>
</head>

<body>

<div id="loader">
  <div class="spinner-border text-info mb-2"></div>
  <div class="text-info">กำลังตรวจสอบสิทธิ...</div>
</div>

<div class="container mt-3 pb-5">
  <h3 class="fw-bold text-info mb-4">🚚 รายการรอจัดส่ง</h3>
  <div id="driver-order-list"></div>
</div>

<!-- Upload Modal -->
<div id="upload-modal" class="modal-full">
  <div class="role-card mx-auto" style="max-width:450px;border-color:#0dcaf0">

    <h5 class="fw-bold mb-2 text-info">📸 ยืนยันการส่งสินค้า</h5>
    <p id="modal-order-id" class="small text-muted mb-3"></p>

    <input type="file" accept="image/*" id="driverSlipInput" class="form-control mb-3">

    <div class="preview-box mb-3">
      <div id="preview-placeholder" class="text-muted small text-center">
        ยังไม่ได้เลือกรูปภาพ
      </div>
      <img id="driver-preview" style="display:none">
    </div>

    <button id="btn-submit-delivery"
      class="btn btn-info w-100 fw-bold text-dark mb-2"
      disabled onclick="submitDelivery()">
      ✅ ยืนยันส่งสำเร็จ
    </button>

    <button class="btn btn-link text-muted w-100"
      onclick="closeUploadModal()">
      ยกเลิก
    </button>

  </div>
</div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script src="Config.js"></script>

<script>
let currentOrderId = "";
let driverImageBase64 = "";
let currentDriverUid = "";

window.onload = async () => {
  try{
    await liff.init({ liffId: CONFIG.LIFF_ID_DRIVER });

    if(!liff.isLoggedIn()){
      liff.login();
      return;
    }

    const profile = await liff.getProfile();
    currentDriverUid = profile.userId;

    loadDriverOrders();

  }catch(e){
    console.error(e);
  }
};

function loadDriverOrders(){
  document.getElementById("loader").style.display="flex";

  fetch(`${CONFIG.GAS_API}?type=driver_list&uid=${currentDriverUid}`)
  .then(res=>res.json())
  .then(res=>{

    const list=document.getElementById("driver-order-list");

    if(!res.orders || res.orders.length===0){
      list.innerHTML="<div class='text-center mt-5 text-muted'>ไม่มีงานค้าง 🎉</div>";
      return;
    }

    /* 🔥 จัดกลุ่มตามที่อยู่ */
    const grouped={};

    res.orders.forEach(o=>{
      const key=o.locat || "ไม่ระบุ";
      if(!grouped[key]) grouped[key]=[];
      grouped[key].push(o);
    });

    list.innerHTML = Object.keys(grouped).map(loc=>{
      const orders=grouped[loc];

      return `
      <div class="mb-4">

        <div class="location-group-header">
          <div class="location-group-title">📍 จุดส่ง: ${loc}</div>
          <div class="location-group-sub">มีทั้งหมด ${orders.length} ออเดอร์</div>
        </div>

        ${orders.map(o=>{
          return `
          <div class="role-card mb-3 border-start border-info border-4">

            <div class="d-flex justify-content-between">
              <span class="badge bg-info text-dark">${o.order_id}</span>
              <small class="text-muted">${o.time||""}</small>
            </div>

            <div class="fw-bold mt-2">${o.customer}</div>
            <div class="text-info small mb-2">📍 ${o.locat}</div>

            <div class="d-flex justify-content-between mb-2">
              <span class="badge bg-secondary">${o.status}</span>
              <span class="text-warning fw-bold">${o.total}</span>
            </div>

            <div class="row g-2">
              <div class="col-4">
                ${
                  o.gps
                  ? `<a href="https://www.google.com/maps/dir/?api=1&destination=${o.gps}&travelmode=driving"
                       target="_blank"
                       class="btn btn-outline-secondary w-100">🗺️</a>`
                  : `<button class="btn btn-outline-secondary w-100" disabled>ไม่มีพิกัด</button>`
                }
              </div>

              <div class="col-8">
                <button class="btn btn-info w-100 fw-bold"
                  onclick="openUploadModal('${o.order_id}')">
                  📷 ส่งงาน
                </button>
              </div>
            </div>

          </div>
          `;
        }).join("")}

      </div>
      `;
    }).join("");

  })
  .finally(()=>{
    document.getElementById("loader").style.display="none";
  });
}

function openUploadModal(id){
  currentOrderId=id;
  driverImageBase64="";

  document.getElementById("modal-order-id").innerText="เลขออเดอร์: "+id;
  document.getElementById("upload-modal").style.display="block";

  document.getElementById("driverSlipInput").onchange=e=>{
    const file=e.target.files[0];
    if(!file)return;

    const reader=new FileReader();
    reader.onload=()=>{
      driverImageBase64=reader.result;

      document.getElementById("driver-preview").src=driverImageBase64;
      document.getElementById("driver-preview").style.display="block";
      document.getElementById("preview-placeholder").style.display="none";

      document.getElementById("btn-submit-delivery").disabled=false;
    };
    reader.readAsDataURL(file);
  };
}

function closeUploadModal(){
  document.getElementById("upload-modal").style.display="none";
}

async function submitDelivery(){

  if(!driverImageBase64){
    alert("แนบรูปก่อน");
    return;
  }

  await fetch(CONFIG.GAS_API,{
    method:"POST",
    body:JSON.stringify({
      type:"update_delivery",
      orderId:currentOrderId,
      uid:currentDriverUid
    })
  });

  alert("ส่งสำเร็จ");
  closeUploadModal();
  loadDriverOrders();
}
</script>

</body>
</html>
