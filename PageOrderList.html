<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order List - Water System</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="Styles.css?v=20260317-2">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    /* สไตล์เพิ่มเติมสำหรับตารางให้ดูง่ายขึ้น */
    .table td { vertical-align: middle; }
    .loading-inline { color: #0dcaf0; text-align: center; padding: 20px; }
  </style>
</head>
<body>
  <div class="container py-3">
    <div class="d-flex align-items-center justify-content-between mb-3">
      <div class="d-flex align-items-center">
        <button onclick="window.location.href='Dashboard.html'" class="btn btn-dark btn-sm me-2">🔙 กลับ</button>
        <h4 class="fw-bold text-info m-0">📋 ออเดอร์ทั้งหมด</h4>
      </div>
      <span id="order-count" class="badge bg-info text-dark">0 รายการ</span>
    </div>

    <div class="chart-box mb-3">
      <input type="text" id="filter-all" class="form-control form-control-dark" 
             placeholder="🔍 ค้นหาชื่อลูกค้า, รหัส ORD หรือสถานะ..." onkeyup="applyFilters()">
    </div>

    <div class="chart-box p-0 overflow-hidden">
      <div class="table-responsive">
        <table class="table table-dark m-0 table-hover">
          <thead>
            <tr>
              <th style="width: 50%;">ลูกค้า / วันที่</th>
              <th>ยอดสุทธิ</th>
              <th>สถานะ</th>
            </tr>
          </thead>
          <tbody id="table-body">
            <tr>
              <td colspan="3" class="loading-inline">
                <div class="spinner-border spinner-border-sm me-2"></div> กำลังโหลดข้อมูล...
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="Config.js?v=20260317-2"></script>
  <script>
    let allOrders = [];

    async function init() {
      try {
        // 1. เริ่มต้น LIFF (ตรวจสอบ ID ให้ตรงกับหน้า OrderList นะครับ)
        await liff.init({ liffId: CONFIG.LIFF_ID_ORDERLIST || CONFIG.LIFF_ID_SUMMARY });
        
        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        const profile = await liff.getProfile();
        
        // 2. ดึงข้อมูลจาก GAS API
        const response = await fetch(`${CONFIG.GAS_API}?type=admin_get_summary&uid=${profile.userId}`);
        const res = await response.json();

        if (res.status === "success") {
          // เก็บข้อมูลทั้งหมดลงตัวแปร global
          allOrders = res.orders || [];
          
          // 3. สั่งให้โชว์ข้อมูลทั้งหมดทันที
          renderTable(allOrders);
        } else {
          document.getElementById("table-body").innerHTML = `<tr><td colspan="3" class="text-center text-danger">เกิดข้อผิดพลาด: ${res.msg}</td></tr>`;
        }

      } catch (e) {
        console.error("Init Error:", e);
        document.getElementById("table-body").innerHTML = `<tr><td colspan="3" class="text-center text-danger">โหลดข้อมูลไม่สำเร็จ</td></tr>`;
      }
    }

    function renderTable(data) {
      const tbody = document.getElementById("table-body");
      const countEl = document.getElementById("order-count");
      
      if (data.length === 0) {
        tbody.innerHTML = `<tr><td colspan="3" class="text-center py-4 text-muted">ไม่พบข้อมูลออเดอร์</td></tr>`;
        countEl.innerText = `0 รายการ`;
        return;
      }

      // แสดงจำนวนรายการที่พบ
      countEl.innerText = `${data.length} รายการ`;

      // สร้างแถวข้อมูล
      tbody.innerHTML = data.map(o => `
        <tr>
          <td>
            <div class="fw-bold text-info text-truncate" style="max-width: 150px;">${escapeHtml(o.customer || "ไม่ระบุ")}</div>
            <div class="small text-muted" style="font-size: 0.75rem;">${o.order_id} | ${o.time ? o.time.split(" ")[0] : "-"}</div>
          </td>
          <td class="fw-bold text-success">฿${(Number(o.total) || 0).toLocaleString()}</td>
          <td><span class="badge ${getStatusBadge(o.status)}" style="font-size: 0.7rem;">${o.status}</span></td>
        </tr>
      `).join("");
    }

    function getStatusBadge(s) {
      if (s === "ส่งสำเร็จ") return "bg-success";
      if (s === "รอจัดส่ง") return "bg-warning text-dark";
      if (s === "ยกเลิก") return "bg-danger";
      return "bg-secondary";
    }

    function applyFilters() {
      const val = document.getElementById("filter-all").value.toLowerCase();
      // กรองจากตัวแปร allOrders ที่โหลดมาไว้แล้วตอนแรก
      const filtered = allOrders.filter(o => 
        (o.customer && o.customer.toLowerCase().includes(val)) || 
        (o.order_id && o.order_id.toLowerCase().includes(val)) ||
        (o.status && o.status.toLowerCase().includes(val))
      );
      renderTable(filtered);
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    document.addEventListener("DOMContentLoaded", init);
  </script>
</body>
</html>
