<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>จัดการระบบสินค้า - Water Delivery</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="Styles.css">

  <style>
    /* CSS เพิ่มเติมเฉพาะหน้าที่ยังไม่มีใน Styles.css */
    .stock-preview { font-size: 0.8rem; color: #2ecc71; margin-top: 4px; font-weight: bold; }
    .bg-dark-readonly { background-color: #000 !important; color: #6c757d !important; border: 1px solid #2d3238 !important; }
  </style>
</head>

<body>

  <div id="loader">
    <div class="spinner-border text-info mb-2"></div>
    <div class="text-info">กำลังตรวจสอบสิทธิ...</div>
  </div>

  <div class="container container-sm-custom mt-4" style="padding-bottom: 100px;">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h4 class="fw-bold m-0 text-info">⚙️ จัดการระบบสินค้า</h4>
      <button onclick="saveAllToSheet()" id="btn-save-all" class="btn btn-success fw-bold px-4 shadow-sm">บันทึกทั้งหมด</button>
    </div>

    <div id="admin-product-list"></div>

    <div class="add-btn-dashed text-center p-4 mt-3" onclick="addNewProduct()">
      <div class="text-info fs-1">+</div>
      <div class="text-white-50">เพิ่มสินค้าใหม่</div>
    </div>
  </div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="Config.js"></script>

  <script>
    let products = [], currentAdminUid = "Unknown";

    // 1. เริ่มต้นระบบและเช็คสิทธิตาม Config (เช่น STOCK_PAGE หรือ ADMIN_PAGE)
    window.onload = async () => {
      try {
        await liff.init({ liffId: CONFIG.LIFF_ID_ADMIN });
        if (!liff.isLoggedIn()) { liff.login(); return; }

        // เช็คสิทธิเข้าหน้าจัดการสินค้า (อ้างอิงตามที่คุณตั้งใน Config.js)
        const canAccess = await validateAccess("STOCK_PAGE");
        
        if (canAccess) {
          initAfterAuth(); 
        }
      } catch (e) {
        console.error("Auth Error:", e);
        document.getElementById("loader").style.display = "none";
      }
    };

    // 2. ดึงข้อมูลสินค้าหลังจากผ่านด่านตรวจสิทธิ
    async function initAfterAuth() {
      try {
        const profile = await liff.getProfile();
        currentAdminUid = profile.userId;

        const res = await fetch(`${CONFIG.GAS_API}?type=admin_get_products`).then(r => r.json());
        // เพิ่มฟิลด์ addStock เพื่อใช้คำนวณในเครื่องลูกค้า
        products = (res.products || []).map(p => ({ ...p, addStock: 0 }));
        renderAdminProducts();
      } catch (e) { 
        console.error(e);
        alert("❌ ไม่สามารถดึงข้อมูลสินค้าได้");
      } finally { 
        document.getElementById("loader").style.display = "none"; 
      }
    }

    // 3. แสดงผลรายการสินค้า
    function renderAdminProducts() {
      const list = document.getElementById("admin-product-list");
      list.innerHTML = products.map((p, i) => `
        <div class="role-card shadow-sm">
          <div class="row g-2">
            <div class="col-12 mb-2">
              <label class="label-cyan">ชื่อสินค้า/รายละเอียด</label>
              <input type="text" class="form-control form-control-dark fw-bold text-info" 
                value="${p.desc}" onchange="updateLocalData(${i},'desc',this.value)">
            </div>
            <div class="col-4">
              <label class="label-cyan">ราคา (฿)</label>
              <input type="number" class="form-control form-control-dark" 
                value="${p.price}" onchange="updateLocalData(${i},'price',this.value)">
            </div>
            <div class="col-4">
              <label class="label-cyan text-muted">สต็อกเดิม</label>
              <input type="number" class="form-control bg-dark-readonly" value="${p.stock}" disabled>
            </div>
            <div class="col-4">
              <label class="label-cyan">➕ เติมสต็อก</label>
              <input type="number" class="form-control form-control-dark border-info" 
                placeholder="0" oninput="calculateStock(${i}, this.value)">
              <div class="stock-preview" id="preview-${i}">รวม: ${p.stock} แพ็ก</div>
            </div>
          </div>
        </div>`).join("");
    }

    function calculateStock(index, value) {
      const addValue = Number(value) || 0;
      products[index].addStock = addValue;
      const total = products[index].stock + addValue;
      document.getElementById(`preview-${index}`).innerText = `รวม: ${total} แพ็ก`;
    }

    function updateLocalData(i, f, v) { 
      products[i][f] = (f==='desc') ? v : Number(v); 
    }

    function addNewProduct() { 
      products.push({id:"P-"+Date.now(), desc:"", price:0, stock:0, addStock: 0}); 
      renderAdminProducts(); 
    }

    // 4. บันทึกข้อมูลทั้งหมดลง Google Sheet
    async function saveAllToSheet() {
      const btn = document.getElementById("btn-save-all");
      
      // คำนวณยอดสต็อกสุทธิก่อนส่ง
      const dataToSave = products.map(p => ({
        id: p.id,
        desc: p.desc,
        price: p.price,
        stock: p.stock + (p.addStock || 0)
      }));

      btn.disabled = true; 
      btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> กำลังบันทึก...';
      
      try {
        const res = await fetch(CONFIG.GAS_API, {
          method: "POST",
          body: JSON.stringify({ 
            type: "admin_sync_all_products", 
            adminUid: currentAdminUid, 
            data: dataToSave 
          })
        }).then(r => r.json());

        if(res.status === "success") {
          alert("✅ อัปเดตข้อมูลและสต็อกเรียบร้อยแล้ว!");
          location.reload(); 
        } else {
          alert("⚠️ บันทึกล้มเหลว: " + (res.msg || "กรุณาลองใหม่"));
        }
      } catch (e) { 
        alert("❌ เกิดข้อผิดพลาดในการเชื่อมต่อเซิร์ฟเวอร์"); 
      } finally { 
        btn.disabled = false; 
        btn.innerText = "บันทึกทั้งหมด"; 
      }
    }
  </script>
</body>
</html>
