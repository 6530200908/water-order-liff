<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>จัดการสิทธิผู้ใช้งาน</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="Styles.css">
</head>
<body>

  <div id="loader">
    <div class="spinner-border text-info mb-2"></div>
    <div class="text-white">กำลังตรวจสอบสิทธิ...</div>
  </div>

  <div class="container mt-4 mb-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h4 class="fw-bold m-0 text-info">🔐 จัดการสิทธิ</h4>
      <button onclick="saveRoles()" id="btn-save" class="btn btn-success px-4 fw-bold">บันทึกทั้งหมด</button>
    </div>

    <div id="role-list"></div>

    <div class="add-btn-dashed text-center py-3 mt-3" onclick="addRole()">
      <div class="text-info fw-bold">+ เพิ่มผู้ใช้งาน</div>
    </div>
  </div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="Config.js"></script>
  <script>
    let userRoles = [], currentAdminUid = "";

    async function init() {
      try {
        await liff.init({ liffId: CONFIG.LIFF_ID_ADMIN });
        if (!liff.isLoggedIn()) { liff.login(); return; }
        const profile = await liff.getProfile();
        currentAdminUid = profile.userId;
        
        const res = await fetch(`${CONFIG.GAS_API}?type=admin_get_roles&uid=${currentAdminUid}`).then(r => r.json());
        userRoles = res.roles || [];
        renderRoles();
      } catch (e) { alert("❌ โหลดข้อมูลล้มเหลว"); }
      finally { document.getElementById("loader").style.display = "none"; }
    }

    function renderRoles() {
      const list = document.getElementById("role-list");
      list.innerHTML = userRoles.map((item, i) => `
        <div class="role-card">
          <div class="row align-items-end g-2">
            <div class="col-sm-8">
              <label class="label-cyan">LINE UserID</label>
              <input type="text" class="form-control form-control-dark" value="${item.uid}" 
                onchange="updateRoleData(${i}, 'uid', this.value)" placeholder="Uf06e931...">
            </div>
            <div class="col-sm-3 col-10">
              <label class="label-cyan">สิทธิ</label>
              <select class="form-select form-control-dark" onchange="updateRoleData(${i}, 'role', this.value)">
                <option value="Admin" ${item.role === 'Admin' ? 'selected' : ''}>Admin</option>
                <option value="Staff" ${item.role === 'Staff' ? 'selected' : ''}>Staff</option>
              </select>
            </div>
            <div class="col-sm-1 col-2 text-end">
              <span class="btn-delete" onclick="removeRole(${i})">✕</span>
            </div>
          </div>
        </div>
      `).join("");
    }

    function updateRoleData(i, f, v) { userRoles[i][f] = v; }
    function addRole() { userRoles.push({ uid: "", role: "Staff" }); renderRoles(); }
    function removeRole(i) { if(confirm("ลบสิทธินี้?")) { userRoles.splice(i, 1); renderRoles(); } }

    async function saveRoles() {
      const btn = document.getElementById("btn-save");
      btn.disabled = true; btn.innerText = "กำลังบันทึก...";
      try {
        const res = await fetch(CONFIG.GAS_API, {
          method: "POST",
          body: JSON.stringify({ type: "admin_update_roles", adminUid: currentAdminUid, data: userRoles })
        }).then(r => r.json());
        if(res.status === "success") alert("✅ บันทึกเรียบร้อย!");
      } catch (e) { alert("❌ ผิดพลาด"); }
      finally { btn.disabled = false; btn.innerText = "บันทึกทั้งหมด"; }
    }
    window.onload = init;
  </script>
</body>
</html>
