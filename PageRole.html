<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>จัดการสิทธิผู้ใช้งาน - Water Delivery</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;700&display=swap" rel="stylesheet">
  
  <style>
    /* แก้ไขปัญหาตัวอักษรกลืนพื้นหลัง: ใช้ High Contrast */
    body { 
      background-color: #0b0e11 !important; 
      color: #ffffff !important; 
      font-family: 'Chakra Petch', sans-serif;
    }

    .container { max-width: 600px; }

    /* การ์ดแสดงสิทธิ - ปรับให้เด่นชัด */
    .role-card { 
      background: #161a1e !important; 
      border: 1px solid #2d3238; 
      border-radius: 15px; 
      padding: 20px; 
      margin-bottom: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      transition: 0.3s;
    }
    .role-card:hover { border-color: #0dcaf0; }

    /* ปรับแต่ง Label และ Input ให้สว่าง */
    label.small { 
      color: #0dcaf0 !important; /* สีฟ้าสว่าง */
      font-weight: bold; 
      display: block;
      margin-bottom: 5px;
    }

    .form-control, .form-select {
      background-color: #1f2327 !important;
      color: #ffffff !important;
      border: 1px solid #3f444a !important;
    }
    .form-control:focus, .form-select:focus {
      border-color: #0dcaf0 !important;
      box-shadow: 0 0 0 0.25rem rgba(13, 202, 240, 0.25);
    }

    .btn-delete { 
      color: #ff4d4d; 
      cursor: pointer; 
      font-size: 1.5rem; 
      line-height: 1;
      transition: 0.2s;
    }
    .btn-delete:hover { color: #ff0000; transform: scale(1.2); }

    .add-btn-box {
      border: 2px dashed #2d3238; 
      border-radius: 15px;
      cursor: pointer;
      transition: 0.3s;
    }
    .add-btn-box:hover { border-color: #0dcaf0; background: rgba(13, 202, 240, 0.05); }

    /* Loader */
    #loader {
      position: fixed; inset: 0; background: rgba(0,0,0,0.9);
      display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000;
    }
  </style>
</head>
<body>

  <div id="loader">
    <div class="spinner-border text-info mb-2"></div>
    <div class="text-info">กำลังตรวจสอบสิทธิ...</div>
  </div>

  <div class="container mt-4 mb-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h4 class="fw-bold m-0 text-info">🔐 จัดการสิทธิผู้ใช้งาน</h4>
      <button onclick="saveRoles()" id="btn-save" class="btn btn-success px-4 fw-bold shadow-sm">บันทึกทั้งหมด</button>
    </div>

    <div id="role-list"></div>

    <div class="add-btn-box text-center py-3 mt-3" onclick="addRole()">
      <div class="text-info fw-bold">+ เพิ่มผู้ใช้งาน / กำหนดสิทธิ</div>
    </div>
  </div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="Config.js"></script>
  <script>
    let userRoles = [], currentAdminUid = "";

    // 1. เริ่มต้นระบบและเช็คสิทธิทันทีเมื่อโหลดหน้า
    window.onload = async () => {
      try {
        await liff.init({ liffId: CONFIG.LIFF_ID_ADMIN });
        if (!liff.isLoggedIn()) { liff.login(); return; }

        // เช็คสิทธิตาม Config: ถ้า "ROLE_PAGE" อนุญาตให้เข้า แปลว่าแก้ได้
        const canAccess = await validateAccess("ROLE_PAGE");
        
        if (canAccess) {
          initAfterAuth(); 
        }
      } catch (e) {
        console.error("Auth Error:", e);
        document.getElementById("loader").style.display = "none";
      }
    };

    // 2. โหลดข้อมูลเมื่อยืนยันสิทธิผ่านแล้ว
    async function initAfterAuth() {
      try {
        const profile = await liff.getProfile();
        currentAdminUid = profile.userId;

        const res = await fetch(`${CONFIG.GAS_API}?type=admin_get_roles&uid=${currentAdminUid}`).then(r => r.json());
        userRoles = res.roles || [];
        renderRoles();
      } catch (e) { 
        console.error(e); 
        alert("❌ ไม่สามารถดึงข้อมูลจากเซิร์ฟเวอร์ได้");
      } finally { 
        document.getElementById("loader").style.display = "none"; 
      }
    }

    // 3. แสดงผลรายการสิทธิ
    function renderRoles() {
      const list = document.getElementById("role-list");
      list.innerHTML = userRoles.map((item, i) => `
        <div class="role-card">
          <div class="row align-items-center g-2">
            <div class="col-8">
              <label class="small">LINE UserID</label>
              <input type="text" class="form-control" value="${item.uid}" 
                onchange="updateRoleData(${i}, 'uid', this.value)" placeholder="Uf06e931...">
            </div>
            <div class="col-3">
              <label class="small">สิทธิการเข้าถึง</label>
              <select class="form-select" onchange="updateRoleData(${i}, 'role', this.value)">
                <option value="Admin" ${item.role === 'Admin' ? 'selected' : ''}>Admin</option>
                <option value="Staff" ${item.role === 'Staff' ? 'selected' : ''}>Staff</option>
              </select>
            </div>
            <div class="col-1 text-end">
              <span class="btn-delete" onclick="removeRole(${i})">✕</span>
            </div>
          </div>
        </div>
      `).join("");
    }

    function updateRoleData(i, f, v) { userRoles[i][f] = v; }
    function addRole() { userRoles.push({ uid: "", role: "Staff" }); renderRoles(); }
    function removeRole(i) { userRoles.splice(i, 1); renderRoles(); }

    // 4. บันทึกข้อมูล (ในเมื่อเข้าหน้าได้แล้ว การบันทึกต้องทำได้ปกติ)
    async function saveRoles() {
      const btn = document.getElementById("btn-save");
      btn.disabled = true; 
      btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> กำลังบันทึก...';
      
      try {
        const res = await fetch(CONFIG.GAS_API, {
          method: "POST",
          body: JSON.stringify({ 
            type: "admin_update_roles", 
            adminUid: currentAdminUid, 
            data: userRoles 
          })
        }).then(r => r.json());
        
        if(res.status === "success") {
           alert("✅ อัปเดตสิทธิผู้ใช้งานเรียบร้อยแล้ว!");
        } else {
           alert("⚠️ บันทึกล้มเหลว: " + (res.msg || "กรุณาลองใหม่อีกครั้ง"));
        }
      } catch (e) { 
        alert("❌ เกิดข้อผิดพลาดในการเชื่อมต่อเซิร์ฟเวอร์"); 
      } finally { 
        btn.disabled = false; 
        btn.innerText = "บันทึกทั้งหมด"; 
      }
    }
  </script>
</body>
</html>
