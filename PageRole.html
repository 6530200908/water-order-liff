<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>จัดการสิทธิผู้ใช้งาน - Water Delivery</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;700&family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="Styles.css?v=20260316-2">
  <style>
    #loader {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    #loader.hidden {
      display: none !important;
      opacity: 0 !important;
      visibility: hidden !important;
      pointer-events: none !important;
    }
  </style>
</head>
<body>

  <div id="loader">
    <div class="spinner-border text-info mb-2"></div>
    <div class="text-white">กำลังตรวจสอบสิทธิ...</div>
  </div>

  <div class="container mt-4 mb-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h4 class="fw-bold m-0 text-info">🔐 จัดการสิทธิ</h4>
      <button onclick="saveRoles()" id="btn-save" class="btn btn-success px-4 fw-bold shadow-sm">
        บันทึกทั้งหมด
      </button>
    </div>

    <div id="role-list"></div>

    <div class="add-btn-dashed text-center py-3 mt-3" onclick="addRole()" style="cursor: pointer;">
      <div class="text-info fw-bold">+ เพิ่มผู้ใช้งาน / กำหนดสิทธิ</div>
    </div>
  </div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="Config.js?v=20260316-2"></script>

  <script>
    let userRoles = [];
    let currentAdminUid = "";

    function showLoader(message = "กำลังตรวจสอบสิทธิ...") {
      const loader = document.getElementById("loader");
      if (!loader) return;
      loader.classList.remove("hidden");
      loader.style.display = "flex";
      const textNode = loader.querySelector(".text-white");
      if (textNode) textNode.textContent = message;
    }

    function hideLoader() {
      const loader = document.getElementById("loader");
      if (!loader) return;
      loader.classList.add("hidden");
      loader.style.display = "none";
      loader.style.opacity = "0";
      loader.style.visibility = "hidden";
      loader.style.pointerEvents = "none";
    }

    async function readJsonSafe(response) {
      const text = await response.text();
      try {
        return JSON.parse(text);
      } catch (err) {
        throw new Error("เซิร์ฟเวอร์ไม่ได้ส่ง JSON กลับมา: " + text.substring(0, 300));
      }
    }

    async function init() {
      showLoader("กำลังตรวจสอบสิทธิ...");

      try {
        await liff.init({ liffId: CONFIG.LIFF_ID_ROLE });

        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        const profile = await liff.getProfile();
        currentAdminUid = profile.userId || "";

        const url = `${CONFIG.GAS_API}?type=admin_get_roles&uid=${encodeURIComponent(currentAdminUid)}`;

        const response = await fetch(url, {
          method: "GET",
          cache: "no-store"
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const res = await readJsonSafe(response);

        if (res.status !== "success") {
          throw new Error(res.msg || "GAS ตอบกลับไม่สำเร็จ");
        }

        userRoles = Array.isArray(res.roles) ? res.roles : [];
        renderRoles();
        hideLoader();

      } catch (e) {
        console.error("Init Error:", e);
        hideLoader();
        alert("❌ โหลดข้อมูลล้มเหลว\n\nรายละเอียด: " + e.message);
      }
    }

    function renderRoles() {
      const list = document.getElementById("role-list");

      if (!Array.isArray(userRoles) || userRoles.length === 0) {
        list.innerHTML = `
          <div class="text-center py-5 text-white-50">
            ไม่พบข้อมูลผู้ใช้งานในระบบ
          </div>
        `;
        return;
      }

      list.innerHTML = userRoles.map((item, i) => `
        <div class="role-card shadow-sm mb-3 p-3"
             style="background: rgba(255,255,255,0.05); border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);">
          <div class="row align-items-end g-2">
            <div class="col-sm-7 col-12">
              <label class="text-info small mb-1">LINE UserID</label>
              <input
                type="text"
                class="form-control bg-dark text-white border-secondary"
                value="${escapeHtml(item.uid || "")}"
                onchange="updateRoleData(${i}, 'uid', this.value)"
                placeholder="Uf06e931..."
              >
            </div>

            <div class="col-sm-4 col-10">
              <label class="text-info small mb-1">สิทธิเข้าใช้งาน</label>
              <select
                class="form-select bg-dark text-white border-secondary"
                onchange="updateRoleData(${i}, 'role', this.value)"
              >
                <option value="Admin" ${item.role === "Admin" ? "selected" : ""}>Admin</option>
                <option value="Staff" ${item.role === "Staff" ? "selected" : ""}>Staff</option>
              </select>
            </div>

            <div class="col-sm-1 col-2 text-end">
              <button class="btn btn-outline-danger border-0" onclick="removeRole(${i})">✕</button>
            </div>
          </div>
        </div>
      `).join("");
    }

    function updateRoleData(index, field, value) {
      if (!userRoles[index]) return;
      userRoles[index][field] = value.trim();
    }

    function addRole() {
      userRoles.push({ uid: "", role: "Staff" });
      renderRoles();
    }

    function removeRole(index) {
      if (confirm("ยืนยันการลบสิทธิผู้ใช้งานท่านนี้?")) {
        userRoles.splice(index, 1);
        renderRoles();
      }
    }

    async function saveRoles() {
      const btn = document.getElementById("btn-save");
      const originalHTML = btn.innerHTML;

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> กำลังบันทึก...';

      try {
        const response = await fetch(CONFIG.GAS_API, {
          method: "POST",
          headers: {
            "Content-Type": "text/plain;charset=utf-8"
          },
          body: JSON.stringify({
            type: "admin_update_roles",
            adminUid: currentAdminUid,
            data: userRoles
          })
        });

        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const res = await readJsonSafe(response);

        if (res.status === "success") {
          alert("✅ อัปเดตสิทธิผู้ใช้งานเรียบร้อยแล้ว!");
        } else {
          throw new Error(res.msg || "Unknown Error");
        }

      } catch (e) {
        console.error("Save Error:", e);
        alert("❌ บันทึกไม่สำเร็จ\n\nรายละเอียด: " + e.message);
      } finally {
        btn.disabled = false;
        btn.innerHTML = originalHTML;
      }
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    document.addEventListener("DOMContentLoaded", init);
  </script>
</body>
</html>
