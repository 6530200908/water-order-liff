<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>จัดการสิทธิผู้ใช้งาน - Water Delivery</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="Styles.css">
</head>
<body>

  <div id="loader">
    <div class="spinner-border text-info mb-2"></div>
    <div class="text-info">กำลังตรวจสอบสิทธิ...</div>
  </div>

  <div class="container container-sm-custom mt-4 mb-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h4 class="fw-bold m-0 text-info">🔐 จัดการสิทธิผู้ใช้งาน</h4>
      <button onclick="saveRoles()" id="btn-save" class="btn btn-success px-4 fw-bold shadow-sm">บันทึกทั้งหมด</button>
    </div>

    <div id="role-list"></div>

    <div class="add-btn-dashed text-center py-3 mt-3" onclick="addRole()">
      <div class="text-info fw-bold">+ เพิ่มผู้ใช้งาน / กำหนดสิทธิ</div>
    </div>
  </div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="Config.js"></script>
  <script>
    let userRoles = [], currentAdminUid = "";

    window.onload = async () => {
      try {
        await liff.init({ liffId: CONFIG.LIFF_ID_ADMIN });
        if (!liff.isLoggedIn()) { liff.login(); return; }
        const canAccess = await validateAccess("ROLE_PAGE");
        if (canAccess) { initAfterAuth(); }
      } catch (e) {
        console.error("Auth Error:", e);
        document.getElementById("loader").style.display = "none";
      }
    };

    async function initAfterAuth() {
      try {
        const profile = await liff.getProfile();
        currentAdminUid = profile.userId;
        const res = await fetch(`${CONFIG.GAS_API}?type=admin_get_roles&uid=${currentAdminUid}`).then(r => r.json());
        userRoles = res.roles || [];
        renderRoles();
      } catch (e) { 
        alert("❌ ไม่สามารถดึงข้อมูลจากเซิร์ฟเวอร์ได้");
      } finally { 
        document.getElementById("loader").style.display = "none"; 
      }
    }

    function renderRoles() {
      const list = document.getElementById("role-list");
      list.innerHTML = userRoles.map((item, i) => `
        <div class="role-card">
          <div class="row align-items-center g-2">
            <div class="col-8">
              <label class="label-cyan">LINE UserID</label>
              <input type="text" class="form-control form-control-dark" value="${item.uid}" 
                onchange="updateRoleData(${i}, 'uid', this.value)" placeholder="Uf06e931...">
            </div>
            <div class="col-3">
              <label class="label-cyan">สิทธิการเข้าถึง</label>
              <select class="form-select form-control-dark" onchange="updateRoleData(${i},
