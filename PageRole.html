<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>จัดการสิทธิผู้ใช้งาน - Water Delivery</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;700&family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="Styles.css">
</head>
<body>

  <div id="loader">
    <div class="spinner-border text-info mb-2"></div>
    <div class="text-white">กำลังตรวจสอบสิทธิ...</div>
  </div>

  <div class="container mt-4 mb-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h4 class="fw-bold m-0 text-info">🔐 จัดการสิทธิ</h4>
      <button onclick="saveRoles()" id="btn-save" class="btn btn-success px-4 fw-bold shadow-sm">บันทึกทั้งหมด</button>
    </div>

    <div id="role-list"></div>

    <div class="add-btn-dashed text-center py-3 mt-3" onclick="addRole()" style="cursor: pointer;">
      <div class="text-info fw-bold">+ เพิ่มผู้ใช้งาน / กำหนดสิทธิ</div>
    </div>
  </div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="Config.js"></script>
  
  <script>
    let userRoles = []; 
    let currentAdminUid = "";

    // ฟังก์ชันเริ่มต้น: ตรวจสอบ LIFF และดึงข้อมูล
    async function init() {
      try {
        await liff.init({ liffId: CONFIG.LIFF_ID_ADMIN });
        
        if (!liff.isLoggedIn()) { 
          liff.login(); 
          return; 
        }

        const profile = await liff.getProfile();
        currentAdminUid = profile.userId;
        
        // ดึงข้อมูลจาก Google Apps Script
        const response = await fetch(`${CONFIG.GAS_API}?type=admin_get_roles&uid=${currentAdminUid}`, {
          method: "GET",
          cache: "no-store"
        });

        if (!response.ok) throw new Error("Network Response Fail");

        const res = await response.json();
        userRoles = res.roles || [];
        renderRoles();

      } catch (e) { 
        console.error("Init Error:", e);
        alert("❌ โหลดข้อมูลล้มเหลว: โปรดตรวจสอบการ Deploy GAS และสิทธิ 'Anyone'"); 
      } finally { 
        document.getElementById("loader").style.display = "none"; 
      }
    }

    // ฟังก์ชันแสดงผลรายการสิทธิลงในหน้า HTML
    function renderRoles() {
      const list = document.getElementById("role-list");
      
      if (userRoles.length === 0) {
        list.innerHTML = `<div class="text-center py-5 text-white-50">ไม่พบข้อมูลผู้ใช้งานในระบบ</div>`;
        return;
      }

      list.innerHTML = userRoles.map((item, i) => `
        <div class="role-card shadow-sm mb-3 p-3" style="background: rgba(255,255,255,0.05); border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);">
          <div class="row align-items-end g-2">
            <div class="col-sm-7 col-12">
              <label class="text-info small mb-1">LINE UserID</label>
              <input type="text" class="form-control bg-dark text-white border-secondary" 
                value="${item.uid || ''}" 
                onchange="updateRoleData(${i}, 'uid', this.value)" 
                placeholder="Uf06e931...">
            </div>
            
            <div class="col-sm-4 col-10">
              <label class="text-info small mb-1">สิทธิเข้าใช้งาน</label>
              <select class="form-select bg-dark text-white border-secondary" onchange="updateRoleData(${i}, 'role', this.value)">
                <option value="Admin" ${item.role === 'Admin' ? 'selected' : ''}>Admin</option>
                <option value="Staff" ${item.role === 'Staff' ? 'selected' : ''}>Staff</option>
              </select>
            </div>
            
            <div class="col-sm-1 col-2 text-end">
              <button class="btn btn-outline-danger border-0" onclick="removeRole(${i})">✕</button>
            </div>
          </div>
        </div>
      `).join("");
    }

    // อัปเดตข้อมูลในตัวแปร userRoles
    function updateRoleData(index, field, value) { 
      userRoles[index][field] = value.trim(); 
    }

    // เพิ่มแถวใหม่
    function addRole() { 
      userRoles.push({ uid: "", role: "Staff" }); 
      renderRoles(); 
    }
    
    // ลบแถว
    function removeRole(index) { 
      if(confirm("ยืนยันการลบสิทธิผู้ใช้งานท่านนี้?")) { 
        userRoles.splice(index, 1); 
        renderRoles(); 
      } 
    }

    // ฟังก์ชันบันทึกข้อมูล (POST)
    async function saveRoles() {
      const btn = document.getElementById("btn-save");
      const originalText = btn.innerText;
      
      btn.disabled = true; 
      btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> กำลังบันทึก...';
      
      try {
        const response = await fetch(CONFIG.GAS_API, {
          method: "POST",
          body: JSON.stringify({ 
            type: "admin_update_roles", 
            adminUid: currentAdminUid, 
            data: userRoles 
          })
        });

        const res = await response.json();
        
        if(res.status === "success") {
          alert("✅ อัปเดตสิทธิผู้ใช้งานเรียบร้อยแล้ว!");
        } else {
          alert("⚠️ บันทึกไม่สำเร็จ: " + (res.msg || "Unknown Error"));
        }
      } catch (e) { 
        console.error("Save Error:", e);
        alert("❌ เชื่อมต่อเซิร์ฟเวอร์ไม่ได้: โปรดตรวจสอบการ Deploy GAS เป็น 'Anyone'"); 
      } finally { 
        btn.disabled = false; 
        btn.innerText = originalText; 
      }
    }

    // รันฟังก์ชันเมื่อโหลดหน้า
    window.onload = init;
  </script>
</body>
</html>
