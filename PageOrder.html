<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>สั่งน้ำดื่ม - ระบบปักหมุด</title>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="Styles.css?v=20260320-FINAL">

  <style>
    #loader { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 9999; display: flex; justify-content: center; align-items: center; }
    .label-cyan { color: #0dcaf0; font-size: 0.85rem; }
    .stat-value small { font-size: 0.9rem; margin-left: 4px; }
    /* เพิ่มปุ่มดึงตำแหน่งปัจจุบันบนแผนที่ */
    .locate-btn { background: white; border: 2px solid rgba(0,0,0,0.2); border-radius: 4px; padding: 5px; cursor: pointer; }
  </style>
</head>
<body>
  <div id="loader">
    <div class="spinner-border text-info mb-3"></div>
    <div id="loader-text">กำลังโหลดข้อมูล...</div>
  </div>

  <div id="page-order" class="container content-wrapper">
    <div class="d-flex justify-content-between align-items-center my-4">
      <h4 class="fw-bold m-0 text-info">🛒 สั่งน้ำดื่ม</h4>
      <button onclick="window.location.href='PageHistory.html'" class="btn btn-sm btn-outline-info rounded-pill px-3">ประวัติ</button>
    </div>

    <div id="product-list"></div>

    <div class="sticky-footer">
      <div class="d-flex justify-content-between mb-2 fs-5">
        <span class="text-white">ยอดรวมทั้งสิ้น</span>
        <span class="fw-bold text-info"><span id="total-price">0</span> ฿</span>
      </div>
      <button class="btn btn-info w-100 p-3 fw-bold rounded-3" onclick="openPayment()">ไปหน้าชำระเงิน</button>
    </div>
  </div>

  <div id="payment-ui" class="payment-overlay" style="display:none;">
    <div class="modal-card p-4 shadow-lg">
      <h5 class="text-center fw-bold mb-4 text-info">📍 ข้อมูลจัดส่ง</h5>

      <label class="label-cyan">ชื่อผู้รับ</label>
      <input type="text" id="cusName" class="form-control form-control-dark mb-3" placeholder="ระบุชื่อผู้รับ">

      <label class="label-cyan">สถานที่ส่ง</label>
      <select id="locSelect" class="form-select form-control-dark mb-3" onchange="handleLocationChange(this.value)"></select>

      <input type="hidden" id="gpsData">

      <div id="gps-section" style="display:none;">
        <label class="label-cyan mb-2">📍 ปักหมุดจุดส่งน้ำ (เริ่มต้น: แหลมฉบัง)</label>
        <div id="map" style="height:220px; border-radius:12px; overflow:hidden; margin-bottom: 10px;"></div>
        <p id="gpsStatus" class="small text-center mb-2 text-muted">กดที่แผนที่เพื่อเปลี่ยนจุดส่ง</p>
        <textarea id="cusAddress" class="form-control form-control-dark mb-3" rows="2" placeholder="ที่อยู่เพิ่มเติม (เช่น ตึก ชั้น ฯลฯ)"></textarea>
      </div>

      <button id="btn-confirm" class="btn btn-info w-100 p-3 fw-bold rounded-3 mb-2" onclick="confirmOrder()">ยืนยันการสั่งซื้อ</button>
      <button class="btn btn-link w-100 text-muted text-decoration-none" onclick="closePayment()">แก้ไขรายการ</button>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="Config.js?v=20260320-FINAL"></script>

  <script>
    let currentUserId = "";
    let products = [];
    let cart = {};
    let map = null;
    let marker = null;
    let dbPromptpayID = "";
    let locationMap = {};

    // พิกัดเริ่มต้น: แหลมฉบัง (4WC9+8J5)
    const DEFAULT_LAT = 13.07148;
    const DEFAULT_LNG = 100.55088;

    async function init() {
      try {
        await liff.init({ liffId: CONFIG.LIFF_ID_ORDER });
        if (!liff.isLoggedIn()) { liff.login(); return; }
        const profile = await liff.getProfile();
        currentUserId = profile.userId;

        const res = await fetch(`${CONFIG.GAS_API}?uid=${currentUserId}`).then(r => r.json());
        products = res.products || [];
        dbPromptpayID = res.promptpayID || "";
        
        renderProducts();
        setupLocationOptions(res.locations || []);

        document.getElementById("cusName").value = (res.customer && res.customer.name) ? res.customer.name : profile.displayName;
      } catch (e) { alert("โหลดข้อมูลล้มเหลว"); }
      finally { document.getElementById("loader").style.display = "none"; }
    }

    function setupLocationOptions(locations) {
      const select = document.getElementById("locSelect");
      select.innerHTML = '<option value="">-- เลือกสถานที่ --</option>';
      locationMap = {};
      locations.forEach(loc => {
        const desc = (loc.desc || "").trim();
        if (!desc) return;
        locationMap[desc] = (loc.gps || "").trim();
        select.innerHTML += `<option value="${escapeHtml(desc)}">${escapeHtml(desc)}</option>`;
      });
      select.innerHTML += '<option value="อื่นๆ">📍 อื่นๆ (ปักหมุดเอง)</option>';
    }

    function handleLocationChange(value) {
      const gpsSection = document.getElementById("gps-section");
      if (value === "อื่นๆ") {
        gpsSection.style.display = "block";
        setTimeout(initMap, 300);
      } else {
        gpsSection.style.display = "none";
        document.getElementById("gpsData").value = locationMap[value] || "";
      }
    }

    // ฟังก์ชันดึงพิกัดปัจจุบัน
    function getCurrentPosition() {
      return new Promise((resolve) => {
        if (!navigator.geolocation) return resolve(null);
        navigator.geolocation.getCurrentPosition(
          (pos) => resolve([pos.coords.latitude, pos.coords.longitude]),
          () => resolve(null),
          { enableHighAccuracy: true, timeout: 5000 }
        );
      });
    }

    async function initMap() {
      if (!map) {
        // เริ่มต้นที่พิกัดแหลมฉบังที่คุณกำหนดก่อน
        map = L.map("map").setView([DEFAULT_LAT, DEFAULT_LNG], 15);
        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", { attribution: "&copy; OpenStreetMap" }).addTo(map);

        // ลองดึงพิกัดจริงของผู้ใช้ ถ้าได้ให้เลื่อนไปที่นั่น
        const userPos = await getCurrentPosition();
        if (userPos) {
          map.setView(userPos, 16);
          updateMarker(userPos[0], userPos[1]);
        } else {
          // ถ้าไม่ได้พิกัดผู้ใช้ ให้ปักหมุดไว้ที่แหลมฉบังเป็นค่าเริ่มต้น
          updateMarker(DEFAULT_LAT, DEFAULT_LNG);
        }

        map.on("click", function(e) {
          updateMarker(e.latlng.lat, e.latlng.lng);
        });
      }
      map.invalidateSize();
    }

    function updateMarker(lat, lng) {
      if (marker) { marker.setLatLng([lat, lng]); } 
      else { marker = L.marker([lat, lng]).addTo(map); }
      document.getElementById("gpsData").value = `${lat},${lng}`;
      document.getElementById("gpsStatus").innerText = "📍 ปักหมุดเรียบร้อย";
      document.getElementById("gpsStatus").className = "small text-center mb-2 text-success fw-bold";
    }

    function renderProducts() {
      const listElement = document.getElementById("product-list");
      const avail = products.filter(p => Number(p.stock) > 0);
      if (avail.length === 0) {
        listElement.innerHTML = `<div class="text-center py-5 text-white-50">สินค้าหมดชั่วคราว</div>`;
        return;
      }
      listElement.innerHTML = avail.map((p) => {
        const idx = products.findIndex(item => item.id === p.id);
        return `
          <div class="order-card d-flex justify-content-between align-items-center p-3 mb-2">
            <div>
              <div class="fw-bold text-white">${escapeHtml(p.desc)}</div>
              <div class="text-info small">${p.price} ฿ <span class="text-white-50 ms-1">(สต็อก: ${p.stock})</span></div>
            </div>
            <div class="d-flex align-items-center gap-3">
              <button class="btn btn-sm btn-outline-light rounded-circle" onclick="updateQty(${idx}, -1)">-</button>
              <span id="qty-${idx}" class="fw-bold text-white">0</span>
              <button class="btn btn-sm btn-outline-info rounded-circle" onclick="updateQty(${idx}, 1)">+</button>
            </div>
          </div>
        `;
      }).join("");
    }

    function updateQty(i, d) {
      cart[i] = Math.max(0, (cart[i] || 0) + d);
      if (cart[i] > products[i].stock) { alert("สินค้าไม่พอ"); cart[i] = products[i].stock; }
      document.getElementById(`qty-${i}`).innerText = cart[i];
      let total = 0;
      Object.keys(cart).forEach(k => { total += (cart[k] || 0) * Number(products[k].price || 0); });
      document.getElementById("total-price").innerText = total;
    }

    function openPayment() {
      if (document.getElementById("total-price").innerText === "0") { alert("เลือกน้ำก่อนครับ"); return; }
      document.getElementById("payment-ui").style.display = "flex";
    }

    function closePayment() { document.getElementById("payment-ui").style.display = "none"; }

    async function confirmOrder() {
      const loc = document.getElementById("locSelect").value;
      const name = document.getElementById("cusName").value.trim();
      const gpsValue = document.getElementById("gpsData").value.trim();
      const customAddress = document.getElementById("cusAddress").value.trim();

      if (!name || !loc) { alert("กรอกข้อมูลให้ครบ"); return; }
      const selectedItems = Object.keys(cart).filter(i => cart[i] > 0);
      
      const btn = document.getElementById("btn-confirm");
      btn.disabled = true;
      btn.innerText = "กำลังประมวลผล...";

      const itemDetails = selectedItems.map(i => `- ${products[i].desc} x ${cart[i]}`).join("\n");
      const orderData = {
        uid: currentUserId,
        name: name,
        address: (loc === "อื่นๆ") ? customAddress : loc,
        gps: (loc === "อื่นๆ") ? gpsValue : (locationMap[loc] || ""),
        items: selectedItems.map(i => products[i].desc).join(", "),
        amounts: selectedItems.map(i => String(cart[i])).join(", "),
        total: document.getElementById("total-price").innerText
      };

      try {
        const gasRes = await fetch(CONFIG.GAS_API, { method: "POST", body: JSON.stringify(orderData) }).then(r => r.json());
        if (gasRes.status !== "ok") throw new Error(gasRes.msg);

        if (liff.isInClient()) {
          await liff.sendMessages([{
            type: "text",
            text: `💧 บันทึกออเดอร์สำเร็จ!\nเลขออเดอร์: ${gasRes.orderId}\nคุณ: ${name}\nรายการ:\n${itemDetails}\nรวม: ${orderData.total} บาท\nขอบคุณที่ใช้บริการครับ`
          }]);
          liff.closeWindow();
        } else {
          alert(`สั่งซื้อสำเร็จ! เลขออเดอร์: ${gasRes.orderId}`);
        }
      } catch (err) {
        alert("ผิดพลาด: " + err.message);
        btn.disabled = false;
        btn.innerText = "ยืนยันการสั่งซื้อ";
      }
    }

    function escapeHtml(str) {
      return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }
    window.onload = init;
  </script>
</body>
</html>
