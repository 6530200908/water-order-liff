<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>สั่งน้ำดื่ม - ระบบปักหมุด</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="Styles.css">
  <style>
    #map { 
      height: 250px; 
      width: 100%; 
      border-radius: 12px; 
      margin-bottom: 10px; 
      border: 2px solid #0dcaf0;
    }
    .modal-card { max-height: 90vh; overflow-y: auto; }
  </style>
</head>
<body>
  <div id="loader"><div class="spinner-border text-info"></div></div>
  
  <div id="page-order" class="container" style="padding-bottom: 120px;">
    <div class="d-flex justify-content-between align-items-center my-4">
      <h4 class="fw-bold m-0 text-info">🛒 สั่งน้ำดื่ม</h4>
      <button onclick="window.location.href='PageStatus.html'" class="btn btn-sm btn-outline-info rounded-pill">ประวัติ</button>
    </div>
    <div id="product-list"></div>
    <div class="sticky-footer">
      <div class="d-flex justify-content-between mb-2 fs-5">
        <span>ยอดรวมทั้งสิ้น</span>
        <span class="fw-bold text-info"><span id="total-price">0</span> ฿</span>
      </div>
      <button class="btn btn-info w-100 p-3 fw-bold rounded-3" onclick="openPayment()">ไปหน้าชำระเงิน</button>
    </div>
  </div>

  <div id="payment-ui" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:1000; padding:20px;">
    <div class="modal-card bg-white p-4 rounded-4 shadow-lg mx-auto" style="max-width:500px;">
      <h5 class="text-center fw-bold mb-4">ข้อมูลจัดส่ง</h5>
      <label class="small text-muted">ชื่อผู้รับ</label>
      <input type="text" id="cusName" class="form-control mb-3" placeholder="ระบุชื่อผู้รับ">
      
      <label class="small text-muted">สถานที่ส่ง</label>
      <select id="locSelect" class="form-select mb-3" onchange="handleLocationChange(this.value)"></select>
      
      <div id="gps-section" style="display:none;">
        <label class="small text-muted mb-2 text-primary">📍 จิ้มที่แผนที่เพื่อปักหมุดจุดส่งน้ำ</label>
        <div id="map"></div>
        <p id="gpsStatus" class="small text-center mb-2 text-muted">ยังไม่ได้ปักหมุด</p>
        <input type="hidden" id="gpsData">
        <textarea id="cusAddress" class="form-control mb-3" rows="2" placeholder="ที่อยู่เพิ่มเติม (เช่น ตึกแถวสีครีม ชั้น 1)"></textarea>
      </div>

      <button id="btn-confirm" class="btn btn-info w-100 p-3 fw-bold rounded-3" onclick="confirmOrder()">ยืนยันการสั่งซื้อ</button>
      <button class="btn btn-link w-100 text-muted" onclick="closePayment()">แก้ไขรายการ</button>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="Config.js"></script>
  <script>
    let currentUserId = "", products = [], cart = {}, map, marker;

    async function init() {
      try {
        await liff.init({ liffId: CONFIG.LIFF_ID_ORDER });
        if (!liff.isLoggedIn()) { liff.login(); return; }
        const profile = await liff.getProfile();
        currentUserId = profile.userId;

        const res = await fetch(`${CONFIG.GAS_API}?uid=${currentUserId}`).then(r => r.json());
        products = res.products;
        renderProducts();

        const select = document.getElementById("locSelect");
        select.innerHTML = '<option value="">-- เลือกสถานที่ --</option>';
        res.locations.forEach(loc => select.innerHTML += `<option value="${loc}">${loc}</option>`);
        select.innerHTML += '<option value="อื่นๆ">📍 อื่นๆ (ปักหมุดแผนที่เอง)</option>';

        if (res.customer) {
          document.getElementById("cusName").value = res.customer.name || profile.displayName;
          const isStandardLoc = res.locations.includes(res.customer.address);
          if (res.customer.address && !isStandardLoc) {
            select.value = "อื่นๆ";
            handleLocationChange("อื่นๆ");
            document.getElementById("cusAddress").value = res.customer.address;
            if (res.customer.gps) {
              document.getElementById("gpsData").value = res.customer.gps;
              document.getElementById("gpsStatus").innerText = "✅ มีข้อมูลพิกัดเดิมแล้ว (เลือกใหม่ได้)";
              // ถ้ามีพิกัดเดิม จะไปรอโหลดใน initMap
            }
          } else {
            select.value = res.customer.address || "";
          }
        } else {
          document.getElementById("cusName").value = profile.displayName;
        }
      } catch (e) { console.error(e); }
      finally { document.getElementById("loader").style.display = "none"; }
    }

    function handleLocationChange(v) {
      const section = document.getElementById("gps-section");
      if (v === "อื่นๆ") {
        section.style.display = "block";
        setTimeout(initMap, 300); // ให้เวลา UI วาดรูปก่อนโหลดแผนที่
      } else {
        section.style.display = "none";
      }
    }

    function initMap() {
      if (map) {
        map.invalidateSize();
        return;
      }
      
      // พิกัดเริ่มต้น (ถ้ามีของเดิมให้ไปที่นั่น ถ้าไม่มีไปกรุงเทพ)
      let startLat = 13.7563, startLng = 100.5018;
      const oldGps = document.getElementById("gpsData").value;
      if (oldGps) {
        const parts = oldGps.split(',');
        startLat = parseFloat(parts[0]);
        startLng = parseFloat(parts[1]);
      }

      map = L.map('map').setView([startLat, startLng], 16);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

      if (oldGps) {
        marker = L.marker([startLat, startLng]).addTo(map);
      }

      map.on('click', function(e) {
        const lat = e.latlng.lat;
        const lng = e.latlng.lng;
        if (marker) marker.setLatLng(e.latlng);
        else marker = L.marker(e.latlng).addTo(map);
        
        document.getElementById("gpsData").value = `${lat},${lng}`;
        document.getElementById("gpsStatus").innerText = `📍 ปักหมุดเรียบร้อย: ${lat.toFixed(5)}, ${lng.toFixed(5)}`;
        document.getElementById("gpsStatus").className = "small text-center mb-2 text-success fw-bold";
      });
    }

    function renderProducts() {
      document.getElementById("product-list").innerHTML = products.map((p, i) => `
        <div class="product-card d-flex justify-content-between align-items-center p-3 mb-2 bg-dark rounded-3 text-white">
          <div><div class="fw-bold">${p.desc}</div><div class="text-info small">${p.price} ฿</div></div>
          <div class="d-flex align-items-center gap-3">
            <button class="btn btn-sm btn-outline-light rounded-circle" onclick="updateQty(${i},-1)">-</button>
            <span id="qty-${i}" class="fw-bold">0</span>
            <button class="btn btn-sm btn-outline-info rounded-circle" onclick="updateQty(${i},1)">+</button>
          </div>
        </div>`).join("");
    }

    function updateQty(i, d) {
      cart[i] = Math.max(0, (cart[i] || 0) + d);
      document.getElementById(`qty-${i}`).innerText = cart[i];
      let total = 0;
      Object.keys(cart).forEach(k => { total += cart[k] * products[k].price; });
      document.getElementById("total-price").innerText = total;
    }

    function openPayment() { 
      if(document.getElementById("total-price").innerText === "0") return alert("เลือกน้ำก่อนครับ"); 
      document.getElementById("payment-ui").style.display = "block"; 
    }
    
    function closePayment() { document.getElementById("payment-ui").style.display = "none"; }

    function confirmOrder() {
    const loc = document.getElementById("locSelect").value;
    const gps = document.getElementById("gpsData").value;
    const extra = document.getElementById("cusAddress").value;
    const cusName = document.getElementById("cusName").value;

    if (!loc) return alert("กรุณาเลือกสถานที่ส่ง");
    if (loc === "อื่นๆ" && !gps) return alert("กรุณาปักหมุดในแผนที่ก่อนครับ");

    const finalAddr = (loc === "อื่นๆ") ? extra : loc;
    const gpsValue = (loc === "อื่นๆ") ? gps : "";
    const totalPrice = document.getElementById("total-price").innerText;

    // รายละเอียดสินค้าสำหรับส่งในข้อความ
    const itemsDetail = Object.keys(cart)
        .filter(i => cart[i] > 0)
        .map(i => `- ${products[i].desc} x ${cart[i]}`)
        .join("\n");

    const orderData = { 
        uid: currentUserId, 
        name: cusName, 
        address: finalAddr, 
        gps: gpsValue,
        items: Object.keys(cart).filter(i => cart[i] > 0).map(i => products[i].desc).join(", "),
        amounts: Object.keys(cart).filter(i => cart[i] > 0).map(i => String(cart[i])).join(", "),
        total: totalPrice 
    };

    document.getElementById("btn-confirm").disabled = true;
    document.getElementById("btn-confirm").innerText = "กำลังบันทึก...";

    fetch(CONFIG.GAS_API, { method: "POST", body: JSON.stringify(orderData) })
        .then(r => r.json())
        .then(res => {
            // --- เริ่มส่วนการส่ง Message พร้อม QR Code ---
            
            // 1. กำหนดเลขพร้อมเพย์ของคุณที่นี่ (เบอร์โทร หรือ เลขบัตรประชาชน)
            const promptpayID = "0812345678"; 
            
            // 2. สร้างลิงก์ QR Code ตามยอดเงินจริง
            const qrUrl = `https://promptpay.io/${promptpayID}/${totalPrice}.png`;

            // 3. เตรียมชุดข้อความ
            const orderSummary = `💧 สั่งซื้อสำเร็จ!\nเลขที่ออเดอร์: ${res.orderId}\nผู้รับ: ${cusName}\nรายการ:\n${itemsDetail}\nรวมทั้งสิ้น: ${totalPrice} ฿\n\n📌 ที่ส่ง: ${finalAddr}\n${gpsValue ? '📍 บันทึกพิกัด GPS เรียบร้อย' : ''}`;

            const messages = [
                {
                    type: "text",
                    text: orderSummary
                },
                {
                    type: "image",
                    originalContentUrl: qrUrl,
                    previewImageUrl: qrUrl
                },
                {
                    type: "text",
                    text: `📱 มียอดชำระ ${totalPrice} บาท\nโอนเงินแล้วรบกวนส่งสลิปแจ้งแอดมินด้วยนะครับ ขอบคุณครับ!`
                }
            ];

            // 4. ส่งเข้า LINE Chat
            liff.sendMessages(messages)
                .then(() => liff.closeWindow())
                .catch((err) => {
                    console.error(err);
                    alert("บันทึกสำเร็จ แต่ไม่สามารถส่งภาพ QR เข้าแชทได้");
                    liff.closeWindow();
                });
        })
        .catch(() => {
            alert("เกิดข้อผิดพลาดในการบันทึก");
            document.getElementById("btn-confirm").disabled = false;
            document.getElementById("btn-confirm").innerText = "ยืนยันการสั่งซื้อ";
        });
}

    window.onload = init;
  </script>
</body>
</html>
