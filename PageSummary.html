<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Water Dashboard - Overview</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="Styles.css?v=20260317-4">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>

  <style>
    /* ป้องกัน Loader ค้าง */
    #loader.hidden {
      display: none !important;
      opacity: 0 !important;
      visibility: hidden !important;
      pointer-events: none !important;
    }
    .stat-value small { font-size: 0.9rem; margin-left: 4px; }
  </style>
</head>
<body>

  <div id="loader">
    <div class="spinner-border text-info mb-3"></div>
    <div id="loader-text">กำลังประมวลผลสรุป...</div>
    <button id="btn-retry" class="btn btn-outline-light btn-sm mt-3 d-none" onclick="location.reload()">โหลดใหม่</button>
  </div>

  <div class="container py-3">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h3 class="fw-bold text-info m-0">📊 ภาพรวมส่งน้ำ</h3>
      <button onclick="window.location.href='OrderList.html'" class="btn btn-outline-info btn-sm rounded-pill px-3">
        ดูรายการทั้งหมด
      </button>
    </div>

    <div class="row g-2 mb-3">
      <div class="col-6 col-md-3">
        <div class="stat-card text-center">
          <div class="text-muted small">รายรับจริง</div>
          <div id="stat-total" class="stat-value" style="color:var(--success)">฿0</div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="stat-card text-center">
          <div class="text-muted small">ส่งสำเร็จ</div>
          <div id="stat-success-count" class="stat-value">0</div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="stat-card text-center">
          <div class="text-muted small">รอจัดส่ง</div>
          <div id="stat-pending" class="stat-value" style="color:var(--warning)">0</div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="stat-card text-center">
          <div class="text-muted small">ยกเลิก</div>
          <div id="stat-cancel" class="stat-value" style="color:var(--danger)">0</div>
        </div>
      </div>
    </div>

    <div class="row g-2 mb-3">
      <div class="col-12 col-md-6">
        <div class="chart-box h-100">
          <div class="text-center small label-cyan mb-2">🏆 5 อันดับสินค้าขายดี (จำนวนชิ้น)</div>
          <div id="top-products-list" class="py-2">
            </div>
        </div>
      </div>
      <div class="col-12 col-md-6">
        <div class="chart-box h-100">
          <div class="text-center small label-cyan mb-2">💰 สัดส่วนยอดขาย (บาท)</div>
          <div id="value-pie-chart" style="height:200px"></div>
        </div>
      </div>
    </div>

    <div class="chart-box">
       <div class="text-center small label-cyan mb-2">📈 ออเดอร์สำเร็จย้อนหลัง 7 วัน</div>
       <div id="bar-chart" style="height:220px"></div>
    </div>
  </div>

  <script src="Config.js?v=20260317-4"></script>
