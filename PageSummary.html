<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Water Dashboard - Mobile Friendly</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;700&family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Styles.css">
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
</head>
<body>

    <div id="loader">
        <div class="spinner-border text-info mb-2"></div>
        <span class="text-info fw-bold">กำลังโหลดข้อมูล...</span>
    </div>

    <div class="container py-3">
        <h3 class="fw-bold text-info mb-3 text-center">📊 สรุปภาพรวมส่งน้ำ</h3>

        <div class="chart-box mb-3">
            <div class="row g-2">
                <div class="col-12 col-md-6">
                    <label class="label-cyan">🔍 ค้นหาลูกค้า / ออเดอร์</label>
                    <input type="text" id="filter-user" class="form-control form-control-dark" placeholder="ระบุชื่อหรือรหัส..." onkeyup="applyFilters()">
                </div>
                <div class="col-12 col-md-6">
                    <label class="label-cyan">💧 ยี่ห้อน้ำ</label>
                    <input type="text" id="filter-bland" class="form-control form-control-dark" placeholder="ระบุยี่ห้อ..." onkeyup="applyFilters()">
                </div>
                <div class="col-6">
                    <label class="label-cyan">📅 ตั้งแต่วันที่</label>
                    <input type="date" id="filter-start" class="form-control form-control-dark" onchange="applyFilters()">
                </div>
                <div class="col-6">
                    <label class="label-cyan">📅 ถึงวันที่</label>
                    <input type="date" id="filter-end" class="form-control form-control-dark" onchange="applyFilters()">
                </div>
            </div>
        </div>

        <div class="row g-2 mb-3">
            <div class="col-6 col-md-3">
                <div class="stat-card text-center">
                    <div class="text-muted small">รายรับจริง</div>
                    <div id="stat-total" class="stat-value" style="color: var(--success) !important;">฿0</div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="stat-card text-center">
                    <div class="text-muted small">ส่งสำเร็จ</div>
                    <div id="stat-success-count" class="stat-value">0</div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="stat-card text-center">
                    <div class="text-muted small">รอจัดส่ง</div>
                    <div id="stat-pending" class="stat-value" style="color: var(--warning) !important;">0</div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="stat-card text-center">
                    <div class="text-muted small">ยกเลิก</div>
                    <div id="stat-cancel" class="stat-value" style="color: var(--danger) !important;">0</div>
                </div>
            </div>
        </div>

        <div class="row g-2">
            <div class="col-12 col-md-6">
                <div class="chart-box">
                    <div class="text-center small label-cyan mb-2">💰 สัดส่วนมูลค่าเงิน (บาท)</div>
                    <div id="value-pie-chart" style="height:220px;"></div>
                </div>
            </div>
            <div class="col-12 col-md-6">
                <div class="chart-box">
                    <div class="text-center small label-cyan mb-2">📈 งานสำเร็จย้อนหลัง</div>
                    <div id="bar-chart" style="height:220px;"></div>
                </div>
            </div>
        </div>

        <div class="chart-box p-0 overflow-hidden">
            <div class="p-2 border-bottom border-secondary bg-dark">
                <span class="small fw-bold text-info">รายการล่าสุด</span>
            </div>
            <div class="table-responsive">
                <table class="table table-dark m-0">
                    <thead>
                        <tr>
                            <th>ลูกค้า</th>
                            <th>ยอด</th>
                            <th>สถานะ</th>
                        </tr>
                    </thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="Config.js"></script>
    <script>
        let allOrders = [];
        google.charts.load('current', {'packages':['corechart']});

        async function init() {
            try {
                const res = await fetch(`${CONFIG.GAS_API}?type=admin_get_summary`).then(r => r.json());
                allOrders = res.orders || [];
                google.charts.setOnLoadCallback(() => renderDashboard(allOrders));
            } catch (e) { 
                console.error(e); 
            } finally { 
                document.getElementById("loader").style.display = "none"; 
            }
        }

        function applyFilters() {
            const u = document.getElementById("filter-user").value.trim().toLowerCase();
            const b = document.getElementById("filter-bland").value.trim().toLowerCase();
            const s = document.getElementById("filter-start").value; 
            const e = document.getElementById("filter-end").value;

            const filtered = allOrders.filter(o => {
                let oDate = "";
                if (o.time) {
                    const dateParts = o.time.split(' ')[0].split('/');
                    if (dateParts.length === 3) oDate = `${dateParts[2]}-${dateParts[1].padStart(2,'0')}-${dateParts[0].padStart(2,'0')}`;
                }
                const matchUser = !u || String(o.customer || "").toLowerCase().includes(u) || String(o.order_id || "").toLowerCase().includes(u);
                const matchBland = !b || String(o.bland || "").toLowerCase().includes(b);
                const matchStart = !s || (oDate && oDate >= s);
                const matchEnd = !e || (oDate && oDate <= e);
                return matchUser && matchBland && matchStart && matchEnd;
            });
            renderDashboard(filtered);
        }

        function renderDashboard(data) {
            const sSuccess = data.filter(o => o.status === 'ส่งสำเร็จ');
            const sPending = data.filter(o => o.status === 'รอจัดส่ง');
            const sCancel = data.filter(o => o.status === 'ยกเลิก');
            const vSuccess = sSuccess.reduce((sum, o) => sum + (Number(o.total) || 0), 0);

            document.getElementById("stat-total").innerText = "฿" + vSuccess.toLocaleString();
            document.getElementById("stat-success-count").innerText = sSuccess.length.toLocaleString();
            document.getElementById("stat-pending").innerText = sPending.length.toLocaleString();
            document.getElementById("stat-cancel").innerText = sCancel.length.toLocaleString();

            document.getElementById("table-body").innerHTML = data.slice(0, 30).map(o => `
                <tr>
                    <td>
                        <div class="fw-bold text-info">${o.customer || 'ไม่ระบุ'}</div>
                        <div class="small text-muted" style="font-size:0.75rem;">${o.order_id} | ${o.time ? o.time.split(' ')[0] : '-'}</div>
                    </td>
                    <td class="fw-bold" style="color: var(--success);">฿${(Number(o.total) || 0).toLocaleString()}</td>
                    <td><span class="badge-status ${getStatusClass(o.status)}">${o.status}</span></td>
                </tr>
            `).join("");

            drawCharts(sSuccess, sPending, sCancel);
        }

        function getStatusClass(s) {
            if(s === 'ส่งสำเร็จ') return 'bg-success-subtle';
            if(s === 'รอจัดส่ง') return 'bg-warning-subtle';
            if(s === 'ยกเลิก') return 'bg-danger-subtle';
            return 'bg-secondary text-white';
        }

        function drawCharts(s1, s2, s3) {
            // ปรับแต่ง Options ตรงนี้เพื่อให้สีตัวอักษรในกราฟไม่กลืนกับพื้นหลัง
            const commonOptions = {
                backgroundColor: 'transparent',
                legend: { textStyle: { color: '#ffffff', fontSize: 11 } },
                chartArea: { width: '90%', height: '80%' }
            };

            const v1 = s1.reduce((sum, o) => sum + (Number(o.total) || 0), 0);
            const v2 = s2.reduce((sum, o) => sum + (Number(o.total) || 0), 0);
            const v3 = s3.reduce((sum, o) => sum + (Number(o.total) || 0), 0);

            // Pie Chart
            new google.visualization.PieChart(document.getElementById('value-pie-chart')).draw(
                google.visualization.arrayToDataTable([['สถานะ', 'บาท'], ['สำเร็จ', v1], ['รอส่ง', v2], ['ยกเลิก', v3]]),
                { ...commonOptions, colors: ['#20c997', '#ffc107', '#ff4d4d'], pieHole: 0.5, pieSliceBorderColor: "none" }
            );

            // Bar Chart
            const dayMap = {};
            s1.forEach(o => { if(o.time) { const d = o.time.split(' ')[0].substring(0, 5); dayMap[d] = (dayMap[d] || 0) + 1; } });
            const barEntries = Object.entries(dayMap).slice(-7);
            new google.visualization.ColumnChart(document.getElementById('bar-chart')).draw(
                google.visualization.arrayToDataTable([['วัน', 'งาน'], ...(barEntries.length ? barEntries : [['', 0]])]),
                { 
                    ...commonOptions, 
                    colors: ['#0dcaf0'], 
                    legend: 'none',
                    hAxis: { textStyle: { color: '#ffffff' } },
                    vAxis: { textStyle: { color: '#ffffff' }, gridlines: { color: '#222' } }
                }
            );
        }

        window.onload = init;
    </script>
</body>
</html>
