<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Water Dashboard - Overview</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="Styles.css?v=20260317-3">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
</head>
<body>

  <div id="loader">
    <div class="spinner-border text-info mb-3"></div>
    <div id="loader-text">กำลังประมวลผลสรุป...</div>
    <button id="btn-retry" class="btn btn-outline-light btn-sm mt-3 d-none" onclick="location.reload()">โหลดใหม่</button>
  </div>

  <div class="container py-3">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h3 class="fw-bold text-info m-0">📊 ภาพรวมส่งน้ำ</h3>
      <button onclick="window.location.href='OrderList.html'" class="btn btn-outline-info btn-sm rounded-pill">ดูรายการทั้งหมด</button>
    </div>

    <div class="row g-2 mb-3">
      <div class="col-6 col-md-3">
        <div class="stat-card text-center">
          <div class="text-muted small">รายรับจริง</div>
          <div id="stat-total" class="stat-value" style="color:var(--success)">฿0</div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="stat-card text-center">
          <div class="text-muted small">ส่งสำเร็จ</div>
          <div id="stat-success-count" class="stat-value">0</div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="stat-card text-center">
          <div class="text-muted small">รอจัดส่ง</div>
          <div id="stat-pending" class="stat-value" style="color:var(--warning)">0</div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="stat-card text-center">
          <div class="text-muted small">ยกเลิก</div>
          <div id="stat-cancel" class="stat-value" style="color:var(--danger)">0</div>
        </div>
      </div>
    </div>

    <div class="row g-2 mb-3">
      <div class="col-12 col-md-6">
        <div class="chart-box h-100">
          <div class="text-center small label-cyan mb-2">🏆 5 อันดับสินค้าขายดี (จำนวนชิ้น)</div>
          <div id="top-products-list" class="py-2"></div>
        </div>
      </div>
      <div class="col-12 col-md-6">
        <div class="chart-box h-100">
          <div class="text-center small label-cyan mb-2">💰 สัดส่วนยอดขาย (บาท)</div>
          <div id="value-pie-chart" style="height:200px"></div>
        </div>
      </div>
    </div>

    <div class="chart-box">
       <div class="text-center small label-cyan mb-2">📈 งานสำเร็จย้อนหลัง 7 วัน</div>
       <div id="bar-chart" style="height:220px"></div>
    </div>
  </div>

  <script src="Config.js?v=20260317-3"></script>
  <script>
    let allOrders = [];
    google.charts.load("current", { packages: ["corechart"], 'language': 'th' });

    async function init() {
      // ป้องกันการค้าง: ถ้าโหลดเกิน 10 วินาที ให้ขึ้นปุ่มลองใหม่
      const timeout = setTimeout(() => {
        document.getElementById("loader-text").innerText = "การเชื่อมต่อช้ากว่าปกติ...";
        document.getElementById("btn-retry").classList.remove("d-none");
      }, 10000);

      try {
        console.log("Initializing LIFF...");
        await liff.init({ liffId: CONFIG.LIFF_ID_SUMMARY });
        
        if (!liff.isLoggedIn()) { 
          liff.login(); 
          return; 
        }

        const profile = await liff.getProfile();
        console.log("Fetching data for UID:", profile.userId);
        
        // เพิ่ม Cache-Control เพื่อให้ได้ข้อมูลใหม่เสมอและไม่โหลดซ้ำซ้อน
        const response = await fetch(`${CONFIG.GAS_API}?type=admin_get_summary&uid=${profile.userId}`, {
          method: 'GET',
          cache: 'no-cache'
        });
        
        const res = await response.json();
        clearTimeout(timeout);

        if (res.status === "success") {
          allOrders = res.orders || [];
          renderDashboard(allOrders);
          document.getElementById("loader").classList.add("hidden");
        } else {
          throw new Error(res.msg || "Server returned error");
        }

      } catch (e) {
        console.error("Init Error:", e);
        document.getElementById("loader-text").innerHTML = `<span class="text-danger">เกิดข้อผิดพลาด: ${e.message}</span>`;
        document.getElementById("btn-retry").classList.remove("d-none");
      }
    }

    // ฟังก์ชัน Render ต่างๆ (เหมือนเดิม แต่เพิ่ม Check ข้อมูลว่าง)
    function renderDashboard(data) {
      const sSuccess = data.filter(o => o.status === "ส่งสำเร็จ");
      const vSuccess = sSuccess.reduce((sum, o) => sum + (Number(o.total) || 0), 0);

      document.getElementById("stat-total").innerText = "฿" + vSuccess.toLocaleString();
      document.getElementById("stat-success-count").innerHTML = `${sSuccess.length} <small class="fs-6 text-muted">ออเดอร์</small>`;
      document.getElementById("stat-pending").innerHTML = `${data.filter(o=>o.status==="รอจัดส่ง").length} <small class="fs-6 text-muted">ออเดอร์</small>`;
      document.getElementById("stat-cancel").innerHTML = `${data.filter(o=>o.status==="ยกเลิก").length} <small class="fs-6 text-muted">ออเดอร์</small>`;

      calculateTopProducts(sSuccess);
      google.charts.setOnLoadCallback(() => drawCharts(data));
    }

    // ... (calculateTopProducts และ drawCharts เหมือนโค้ดเดิมของคุณ) ...
    function calculateTopProducts(successOrders) {
      const productMap = {};
      successOrders.forEach(o => {
        if (!o.items || !o.amounts) return;
        const names = String(o.items).split(", ");
        const counts = String(o.amounts).split(", ");
        names.forEach((name, i) => {
          const qty = parseInt(counts[i]) || 0;
          productMap[name] = (productMap[name] || 0) + qty;
        });
      });

      const top5 = Object.entries(productMap).sort((a, b) => b[1] - a[1]).slice(0, 5);
      const html = top5.map((p, idx) => `
        <div class="d-flex justify-content-between align-items-center mb-2 p-2 border-bottom border-secondary">
          <span class="text-white small">${idx+1}. ${p[0]}</span>
          <span class="text-info fw-bold">${p[1].toLocaleString()} <small class="text-muted">ชิ้น</small></span>
        </div>`).join("");
      document.getElementById("top-products-list").innerHTML = html || '<div class="text-center text-muted">ไม่มีข้อมูล</div>';
    }

    function drawCharts(data) {
      if (document.getElementById("value-pie-chart")) {
        const successVal = data.filter(o=>o.status==="ส่งสำเร็จ").reduce((s,o)=>s+(Number(o.total)||0),0);
        const pendingVal = data.filter(o=>o.status==="รอจัดส่ง").reduce((s,o)=>s+(Number(o.total)||0),0);
        const pieData = google.visualization.arrayToDataTable([['Status', 'Baht'],['สำเร็จ', successVal],['รอส่ง', pendingVal]]);
        new google.visualization.PieChart(document.getElementById("value-pie-chart")).draw(pieData, {
          backgroundColor: "transparent", colors: ["#20c997", "#ffc107"], pieHole: 0.4,
          legend: { textStyle: { color: "#fff" } }, chartArea: { width: "90%", height: "80%" }
        });
      }
      // เพิ่ม Bar Chart ต่อได้ที่นี่
    }

    document.addEventListener("DOMContentLoaded", init);
  </script>
</body>
</html>
