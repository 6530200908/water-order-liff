<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>สรุปยอดการขาย</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
  <style>
    /* แก้ไขปัญหาตัวอักษรกลืนกับพื้นหลัง */
    body { background-color: #0f1113; color: #f8f9fa; font-family: 'Chakra Petch', sans-serif; }
    .filter-section { background: #1a1d21; padding: 25px; border-radius: 15px; border: 1px solid #2d3238; }
    
    /* ปรับแต่ง Label ให้สว่างขึ้น */
    label.small { color: #0dcaf0 !important; font-weight: bold; margin-bottom: 5px; display: block; }
    
    .stat-card { background: #1a1d21; border-radius: 15px; padding: 20px; border: 1px solid #343a40; transition: 0.3s; }
    .stat-card:hover { border-color: #0dcaf0; }
    
    /* ปรับแต่งตารางให้ชัดเจน */
    .table-container { background: #1a1d21; border-radius: 15px; padding: 15px; border: 1px solid #2d3238; }
    .table thead th { background-color: #2d3238 !important; color: #0dcaf0 !important; border: none; }
    .table tbody td { color: #e0e0e0 !important; border-bottom: 1px solid #2d3238; }
    
    /* ส่วนของกราฟ */
    .chart-box { background: #1a1d21; border-radius: 15px; padding: 15px; border: 1px solid #2d3238; min-height: 350px; }
  </style>
</head>
<body>
  <div id="loader" style="position:fixed; inset:0; background:rgba(0,0,0,0.8); display:flex; align-items:center; justify-content:center; z-index:1000;">
    <div class="spinner-border text-info"></div>
  </div>

  <div class="container mt-4 mb-5">
    <h3 class="fw-bold text-info mb-4">📊 Dashboard สรุปยอดขาย</h3>

    <div class="filter-section shadow mb-4">
      <div class="row g-3">
        <div class="col-md-3">
          <label class="small">🔍 ค้นหาลูกค้า/ชื่อ</label>
          <input type="text" id="filter-user" class="form-control bg-dark text-white border-secondary" placeholder="ระบุ UID หรือชื่อ..." oninput="applyFilters()">
        </div>
        <div class="col-md-3">
          <label class="small">💧 ยี่ห้อน้ำ</label>
          <input type="text" id="filter-bland" class="form-control bg-dark text-white border-secondary" placeholder="เช่น สิงห์, คริสตัล..." oninput="applyFilters()">
        </div>
        <div class="col-md-3">
          <label class="small">📅 เริ่มวันที่</label>
          <input type="date" id="filter-start" class="form-control bg-dark text-white border-secondary" onchange="applyFilters()">
        </div>
        <div class="col-md-3">
          <label class="small">📅 ถึงวันที่</label>
          <input type="date" id="filter-end" class="form-control bg-dark text-white border-secondary" onchange="applyFilters()">
        </div>
      </div>
    </div>

    <div class="row g-4 mb-4">
      <div class="col-md-6">
        <div class="chart-box shadow-sm">
          <h6 class="text-center text-info-custom">สัดส่วนยอดขายรายยี่ห้อ (฿)</h6>
          <div id="pie-chart" style="width: 100%; height: 300px;"></div>
        </div>
      </div>
      <div class="col-md-6">
        <div class="chart-box shadow-sm">
          <h6 class="text-center text-info-custom">ออเดอร์รายวัน (จำนวน)</h6>
          <div id="bar-chart" style="width: 100%; height: 300px;"></div>
        </div>
      </div>
    </div>

    <div class="row g-3 mb-4 text-center">
      <div class="col-6 col-md-3">
        <div class="stat-card">
          <div class="small text-muted">จำนวนออเดอร์</div>
          <h2 id="stat-count" class="fw-bold mt-1 text-info">0</h2>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="stat-card">
          <div class="small text-muted">ยอดขายรวม</div>
          <h2 id="stat-total" class="fw-bold mt-1 text-success">฿0</h2>
        </div>
      </div>
    </div>

    <div class="table-container shadow">
      <div class="table-responsive">
        <table class="table align-middle" style="font-size: 0.9rem;">
          <thead>
            <tr>
              <th>Order ID</th>
              <th>ลูกค้า</th>
              <th>ยี่ห้อ</th>
              <th>ยอดเงิน</th>
              <th>วันที่/เวลา</th>
              <th>สถานะ</th>
            </tr>
          </thead>
          <tbody id="table-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="Config.js"></script>
  <script>
    let allOrders = [];
    google.charts.load('current', {'packages':['corechart', 'bar']});

    async function init() {
      try {
        const res = await fetch(`${CONFIG.GAS_API}?type=admin_get_summary`).then(r => r.json());
        allOrders = res.orders || [];
        applyFilters();
      } catch (e) { console.error(e); }
      finally { document.getElementById("loader").style.display = "none"; }
    }

    function applyFilters() {
      const userKey = document.getElementById("filter-user").value.toLowerCase();
      const blandKey = document.getElementById("filter-bland").value.toLowerCase();
      const startDate = document.getElementById("filter-start").value;
      const endDate = document.getElementById("filter-end").value;

      const filtered = allOrders.filter(o => {
        const matchUser = (o.uid || "").toLowerCase().includes(userKey) || (o.customer || "").toLowerCase().includes(userKey);
        const matchBland = (o.bland || "").toLowerCase().includes(blandKey);
        
        const orderDate = new Date(o.time).toISOString().split('T')[0];
        const matchStart = startDate ? orderDate >= startDate : true;
        const matchEnd = endDate ? orderDate <= endDate : true;

        return matchUser && matchBland && matchStart && matchEnd;
      });

      renderDashboard(filtered);
    }

    function renderDashboard(data) {
      renderTable(data);
      renderCharts(data);
    }

    function renderTable(data) {
      const tbody = document.getElementById("table-body");
      let totalSales = 0;

      tbody.innerHTML = data.map(o => {
        totalSales += o.total;
        const dateStr = new Date(o.time).toLocaleString('th-TH', { day:'2-digit', month:'2-digit', year:'2-digit', hour:'2-digit', minute:'2-digit' });
        return `
          <tr>
            <td class="text-info fw-bold">${o.order_id}</td>
            <td>${o.customer}</td>
            <td>${o.bland}</td>
            <td class="fw-bold text-success">฿${o.total.toLocaleString()}</td>
            <td class="text-white-50">${dateStr}</td>
            <td><span class="badge ${getStatusClass(o.status)}">${o.status}</span></td>
          </tr>`;
      }).join("");

      document.getElementById("stat-count").innerText = data.length;
      document.getElementById("stat-total").innerText = `฿${totalSales.toLocaleString()}`;
    }

    function renderCharts(data) {
      if (!data.length) return;

      // 1. เตรียมข้อมูลสำหรับ Pie Chart (ยอดขายแยกตามยี่ห้อ)
      const brandData = {};
      data.forEach(o => {
        const b = o.bland.split(' ')[0]; // เอายี่ห้อหลักคำแรก
        brandData[b] = (brandData[b] || 0) + o.total;
      });
      const pieArray = [['Brand', 'Total Sales'], ...Object.entries(brandData)];
      
      const pieOptions = {
        backgroundColor: 'transparent',
        legend: { textStyle: { color: '#fff' } },
        pieHole: 0.4,
        colors: ['#0dcaf0', '#198754', '#ffc107', '#fd7e14', '#6610f2'],
        chartArea: { width: '90%', height: '80%' }
      };
      new google.visualization.PieChart(document.getElementById('pie-chart')).draw(google.visualization.arrayToDataTable(pieArray), pieOptions);

      // 2. เตรียมข้อมูลสำหรับ Bar Chart (ออเดอร์รายวัน)
      const dailyData = {};
      data.forEach(o => {
        const d = new Date(o.time).toLocaleDateString('th-TH', { day:'numeric', month:'short' });
        dailyData[d] = (dailyArray[d] || 0) + 1;
      });
      const barArray = [['Date', 'Orders'], ...Object.entries(dailyData)];
      
      const barOptions = {
        backgroundColor: 'transparent',
        legend: { position: 'none' },
        hAxis: { textStyle: { color: '#888' } },
        vAxis: { textStyle: { color: '#888' }, gridlines: { color: '#333' } },
        colors: ['#0dcaf0'],
        chartArea: { width: '80%', height: '70%' }
      };
      new google.visualization.ColumnChart(document.getElementById('bar-chart')).draw(google.visualization.arrayToDataTable(barArray), barOptions);
    }

    function getStatusClass(status) {
      if (status.includes("ส่งสำเร็จ") || status.includes("ชำระเงินแล้ว")) return "bg-success";
      if (status.includes("ยกเลิก") || status.includes("สลิปผิด")) return "bg-danger";
      return "bg-warning text-dark";
    }

    window.onload = init;
    window.onresize = () => renderCharts(allOrders); // ปรับขนาดกราฟตามหน้าจอ
  </script>
</body>
</html>
