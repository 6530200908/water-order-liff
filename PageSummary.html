<!DOCTYPE html>

  <title>Water Dashboard - Analytics</title>

  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="Styles.css?v=20260319-FINAL">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>

  <style>
    #loader { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #0dcaf0; }
    #loader.hidden { opacity: 0; visibility: hidden; pointer-events: none; transition: 0.5s; }
    
    /* ปรับช่อง Stat ให้เท่ากัน */
    .stat-card { min-height: 90px; display: flex; flex-direction: column; justify-content: center; }
    .stat-value { font-size: 1.25rem !important; font-weight: bold; }
    .stat-value small { font-size: 0.75rem; color: #aaa; margin-left: 3px; font-weight: normal; }
    
    .chart-box { background: rgba(255,255,255,0.05); border-radius: 15px; padding: 15px; border: 1px solid rgba(255,255,255,0.1); }
    .filter-section { background: rgba(13, 202, 240, 0.1); border-radius: 12px; padding: 12px; margin-bottom: 15px; border: 1px dashed #0dcaf0; }
    .form-control-dark { background: #1a1a1a; border: 1px solid #333; color: #fff; font-size: 0.85rem; }
    .form-control-dark:focus { background: #222; border-color: #0dcaf0; color: #fff; box-shadow: none; }
  </style>
</head>
<body>

  <div id="loader">
    <div class="spinner-border text-info mb-3"></div>
    <div id="loader-text">กำลังประมวลผลข้อมูล...</div>
    <button id="btn-retry" class="btn btn-outline-info btn-sm mt-3 d-none" onclick="location.reload()">ลองอีกครั้ง</button>
  </div>

  <div class="container py-3">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h4 class="fw-bold text-info m-0">📊 สรุปภาพรวมส่งน้ำ</h4>
    </div>

    <div class="filter-section">
      <div class="row g-2 align-items-end">
        <div class="col-5">
          <label class="text-info small mb-1">เริ่ม</label>
          <input type="date" id="date-start" class="form-control form-control-dark">
        </div>
        <div class="col-5">
          <label class="text-info small mb-1">สิ้นสุด</label>
          <input type="date" id="date-end" class="form-control form-control-dark">
        </div>
        <div class="col-2">
          <button class="btn btn-info w-100 p-2" onclick="applyFilter()">
            🔎
          </button>
        </div>
      </div>
    </div>

    <div class="row g-2 mb-3 text-center">
      <div class="col-6 col-md-3">
        <div class="stat-card">
          <div class="text-muted small">รายรับจริง</div>
          <div id="stat-total" class="stat-value text-success">฿0<small>บาท</small></div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="stat-card">
          <div class="text-muted small">จัดส่งสำเร็จ</div>
          <div id="stat-success-count" class="stat-value text-info">0<small>งาน</small></div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="stat-card">
          <div class="text-muted small">รอจัดส่ง</div>
          <div id="stat-pending" class="stat-value text-warning">0<small>งาน</small></div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="stat-card">
          <div class="text-muted small">ยกเลิก</div>
          <div id="stat-cancel" class="stat-value text-danger">0<small>งาน</small></div>
        </div>
      </div>
    </div>

    <div class="row g-2 mb-3">
      <div class="col-12 col-md-6">
        <div class="chart-box h-100">
          <div class="text-center small label-cyan mb-3">🏆 5 อันดับสินค้าขายดี (แพ็ค)</div>
          <div id="top-products-list"></div>
        </div>
      </div>
      <div class="col-12 col-md-6">
        <div class="chart-box h-100">
          <div class="text-center small label-cyan mb-2">💰 สัดส่วนสถานะออเดอร์</div>
          <div id="value-pie-chart" style="height:200px"></div>
        </div>
      </div>
    </div>

    <!-- <div class="chart-box">
        <div class="text-center small label-cyan mb-2">📈 จำนวนงานสำเร็จย้อนหลัง</div>

  <script src="Config.js?v=20260319-FINAL"></script>
  <script>
    let allOrders = [];
    google.charts.load("current", { packages: ["corechart"], 'language': 'th' });

    async function init() {
      const loaderText = document.getElementById("loader-text");
      try {
        await liff.init({ liffId: CONFIG.LIFF_ID_SUMMARY });
        if (!liff.isLoggedIn()) { liff.login(); return; }

        const profile = await liff.getProfile();
        const response = await fetch(`${CONFIG.GAS_API}?type=admin_get_summary&uid=${profile.userId}`);
        const res = await response.json();

        if (res.status === "success") {
          allOrders = res.orders || [];
          renderDashboard(allOrders); // แสดงทั้งหมดในตอนแรก
        } else {
          throw new Error(res.msg || "Server Error");
        }
      } catch (e) {
        console.error(e);
        document.getElementById("btn-retry").classList.remove("d-none");
        loaderText.innerHTML = "เกิดข้อผิดพลาดในการโหลดข้อมูล";
      } finally {
        setTimeout(() => document.getElementById("loader").classList.add("hidden"), 800);
      }
    }

function applyFilter() {
      const startInput = document.getElementById("date-start").value; // มาเป็น "YYYY-MM-DD"
      const endInput = document.getElementById("date-end").value;
      
      if (!startInput || !endInput) {
        renderDashboard(allOrders);
        return;
      }

      // 1. เตรียมช่วงวันที่ (เริ่ม 00:00 - จบ 23:59)
      const startDate = new Date(startInput);
      startDate.setHours(0, 0, 0, 0);
      const endDate = new Date(endInput);
      endDate.setHours(23, 59, 59, 999);

      console.log("Filtering from:", startDate, "to:", endDate);

      const filtered = allOrders.filter(o => {
        if (!o.time) return false;

        try {
          // 2. จัดการกับ String วันที่ (รองรับทั้ง "D/M/YYYY" และ "D/M/YYYY, HH:mm:ss")
          const datePart = o.time.split(",")[0].trim(); 
          const [d, m, y] = datePart.split("/").map(num => parseInt(num));

          // 3. สร้าง Date Object (Month ใน JS ต้อง -1)
          const orderDate = new Date(y, m - 1, d);
          
          // ถ้ามีเวลา ให้ใส่เข้าไปด้วยเพื่อความแม่นยำ
          if (o.time.includes(",")) {
            const timePart = o.time.split(",")[1].trim().split(":");
            orderDate.setHours(parseInt(timePart[0]), parseInt(timePart[1]), parseInt(timePart[2] || 0));
          }

          const isMatch = orderDate >= startDate && orderDate <= endDate;
          
          // ลบ // ข้างหน้า console.log ออกเพื่อดูค่าทีละตัวถ้ายังไม่เจอ
          // console.log(`Checking: ${o.time} -> Interpreted as: ${orderDate} -> Match: ${isMatch}`);
          
          return isMatch;
        } catch (err) {
          console.error("Date Parsing Error on:", o.time, err);
          return false;
        }
      });

      console.log("Found results:", filtered.length);
      renderDashboard(filtered);
    }

    function renderDashboard(data) {
      const successItems = data.filter(o => o.status === "จัดส่งสำเร็จ");
      const pendingItems = data.filter(o => o.status === "รอจัดส่ง");
      const cancelItems = data.filter(o => o.status === "ยกเลิก");

      const totalIncome = successItems.reduce((sum, o) => {
        const cleanPrice = String(o.total || "0").replace(/[^0-9.]/g, '');
        return sum + (Number(cleanPrice) || 0);
      }, 0);

      document.getElementById("stat-total").innerHTML = `฿${totalIncome.toLocaleString()}<small>บาท</small>`;
      document.getElementById("stat-success-count").innerHTML = `${successItems.length}<small>งาน</small>`;
      document.getElementById("stat-pending").innerHTML = `${pendingItems.length}<small>งาน</small>`;
      document.getElementById("stat-cancel").innerHTML = `${cancelItems.length}<small>งาน</small>`;

      const productMap = {};
      successItems.forEach(o => {
        if (!o.bland || !o.amount) return;
        const names = String(o.bland).split(", ");
        const counts = String(o.amount).split(", ");
        names.forEach((name, i) => {
          const qty = parseInt(counts[i]) || 0;
          const cleanName = name.trim();
          if(cleanName) productMap[cleanName] = (productMap[cleanName] || 0) + qty;
        });
      });

      const top5 = Object.entries(productMap).sort((a,b) => b[1]-a[1]).slice(0, 5);
      document.getElementById("top-products-list").innerHTML = top5.map((p, i) => `
        <div class="d-flex justify-content-between mb-2 p-2 border-bottom border-secondary">
          <span class="text-white small">${i+1}. ${p[0]}</span>
          <span class="text-info fw-bold">${p[1].toLocaleString()} แพ็ค</span>
        </div>
      `).join("") || '<div class="text-muted text-center py-3">ไม่มีข้อมูลการขาย</div>';

      google.charts.setOnLoadCallback(() => {
        drawPieChart(successItems.length, pendingItems.length, cancelItems.length);
        drawBarChart(successItems);
      });
    }

    function drawPieChart(s, p, c) {
      const pieTable = google.visualization.arrayToDataTable([
        ['Status', 'Count'], ['สำเร็จ', s], ['รอส่ง', p], ['ยกเลิก', c]
      ]);
      new google.visualization.PieChart(document.getElementById("value-pie-chart")).draw(pieTable, {
        backgroundColor: "transparent",
        colors: ["#20c997", "#ffc107", "#dc3545"],
        pieHole: 0.4,
        legend: { textStyle: { color: "#fff", fontSize: 11 }, position: 'bottom' },
        chartArea: { width: "100%", height: "80%" }
      });
    }

    // function drawBarChart(successData) {
    //   const dayMap = {};
    //   successData.forEach(o => {
    //     const d = o.time ? o.time.split(",")[0].substring(0, 5) : "N/A";
    //     dayMap[d] = (dayMap[d] || 0) + 1;
    //   });
    //   const barArray = [["วันที่", "ออเดอร์"]];
    //   Object.entries(dayMap).slice(-7).forEach(entry => barArray.push(entry));

    //   if(barArray.length > 1) {
    //     new google.visualization.ColumnChart(document.getElementById("bar-chart")).draw(
    //       google.visualization.arrayToDataTable(barArray),
    //       {
    //         backgroundColor: "transparent",
    //         colors: ["#0dcaf0"],
    //         legend: "none",

    //         vAxis: { textStyle: { color: "#fff" }, gridlines: { color: "#333" } },
    //         chartArea: { width: "85%", height: "70%" }
    //       }
    //     );
    //   }
    // }

    document.addEventListener("DOMContentLoaded", init);
  </script>
