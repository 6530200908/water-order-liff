<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Water Delivery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;700&family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Styles.css">
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
</head>
<body>

    <div id="loader">
        <div class="spinner-border text-info mb-2"></div>
        <span class="text-info fw-bold">กำลังประมวลผลข้อมูล...</span>
    </div>

    <div class="container mt-4">
        <h3 class="fw-bold text-info mb-4">📊 Dashboard สรุปยอดขาย (ทั้งหมด)</h3>

        <div class="order-card">
            <div class="row g-3">
                <div class="col-md-3 col-6">
                    <label class="label-cyan">🔍 ค้นหาลูกค้า/ID</label>
                    <input type="text" id="filter-user" class="form-control form-control-dark" placeholder="ระบุชื่อหรือ UID..." oninput="applyFilters()">
                </div>
                <div class="col-md-3 col-6">
                    <label class="label-cyan">💧 ยี่ห้อน้ำ</label>
                    <input type="text" id="filter-bland" class="form-control form-control-dark" placeholder="ระบุยี่ห้อ..." oninput="applyFilters()">
                </div>
                <div class="col-md-3 col-6"><label class="label-cyan">📅 ตั้งแต่วันที่</label><input type="date" id="filter-start" class="form-control form-control-dark" onchange="applyFilters()"></div>
                <div class="col-md-3 col-6"><label class="label-cyan">📅 ถึงวันที่</label><input type="date" id="filter-end" class="form-control form-control-dark" onchange="applyFilters()"></div>
            </div>
        </div>

        <div class="row g-3 my-4 text-center">
            <div class="col-md-3 col-6"><div class="stat-card"><span class="text-muted">รายรับ (สำเร็จ)</span><div id="stat-total" class="stat-value text-success">฿0</div></div></div>
            <div class="col-md-3 col-6"><div class="stat-card"><span class="text-muted">รายการทั้งหมด</span><div id="stat-count" class="stat-value text-white">0</div></div></div>
            <div class="col-md-3 col-6"><div class="stat-card"><span class="text-muted">รอจัดส่ง</span><div id="stat-pending" class="stat-value text-warning">0</div></div></div>
            <div class="col-md-3 col-6"><div class="stat-card"><span class="text-muted">ยกเลิก</span><div id="stat-cancel" class="stat-value text-danger">0</div></div></div>
        </div>

        <div class="row g-4 mb-4">
            <div class="col-md-6">
                <div class="chart-box">
                    <div id="status-pie-chart" style="height:320px;"></div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="chart-box">
                    <div id="bar-chart" style="height:320px;"></div>
                </div>
            </div>
        </div>

        <div class="table-responsive shadow" style="background:#111; border-radius:15px; padding:15px; border:1px solid #222;">
            <table class="table table-dark table-hover m-0">
                <thead><tr class="text-info"><th>ID</th><th>ลูกค้า</th><th>รายการ</th><th>ยอดสุทธิ</th><th>สถานะ</th><th>วันที่</th></tr></thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

    <script src="Config.js"></script>
    <script>
        let allOrders = [];
        google.charts.load('current', {'packages':['corechart']});

        async function init() {
            try {
                const res = await fetch(`${CONFIG.GAS_API}?type=admin_get_summary`).then(r => r.json());
                allOrders = res.orders || [];
                google.charts.setOnLoadCallback(() => renderDashboard(allOrders));
            } catch (e) { console.error(e); }
            finally { document.getElementById("loader").style.display = "none"; }
        }

        function renderDashboard(data) {
            const tbody = document.getElementById("table-body");
            
            // นับแยกสถานะให้ชัดเจนสำหรับกราฟวงกลม
            const sSuccess = data.filter(o => o.status === 'จัดส่งสำเร็จ');
            const sPending = data.filter(o => o.status === 'รอจัดส่ง');
            const sCancel = data.filter(o => o.status === 'ยกเลิก');
            
            const totalMoney = sSuccess.reduce((sum, o) => sum + (Number(o.total) || 0), 0);

            // อัปเดตตัวเลข Stats
            document.getElementById("stat-total").innerText = "฿" + totalMoney.toLocaleString();
            document.getElementById("stat-count").innerText = data.length.toLocaleString();
            document.getElementById("stat-pending").innerText = sPending.length.toLocaleString();
            document.getElementById("stat-cancel").innerText = sCancel.length.toLocaleString();

            // อัปเดตตาราง
            tbody.innerHTML = data.map(o => `
                <tr>
                    <td class="text-info fw-bold">${o.order_id}</td>
                    <td>${o.customer}</td>
                    <td>${o.bland}</td>
                    <td class="text-success fw-bold">฿${Number(o.total).toLocaleString()}</td>
                    <td><span class="badge-status ${getStatusClass(o.status)}">${o.status}</span></td>
                    <td class="text-muted small">${o.time}</td>
                </tr>
            `).join("");

            // วาดกราฟวงกลม 3 สถานะ
            drawPieChart(sSuccess.length, sPending.length, sCancel.length);
            // วาดกราฟแท่งรายวัน
            drawBarChart(data);
        }

        function getStatusClass(s) {
            if(s === 'จัดส่งสำเร็จ') return 'bg-success-subtle';
            if(s === 'รอจัดส่ง') return 'bg-warning-subtle';
            if(s === 'ยกเลิก') return 'bg-danger-subtle';
            return 'bg-secondary';
        }

        function drawPieChart(cSuccess, cPending, cCancel) {
            const pieData = google.visualization.arrayToDataTable([
                ['สถานะ', 'จำนวน'],
                ['จัดส่งสำเร็จ', cSuccess],
                ['รอจัดส่ง', cPending],
                ['ยกเลิก', cCancel]
            ]);

            new google.visualization.PieChart(document.getElementById('status-pie-chart')).draw(pieData, {
                backgroundColor: 'transparent',
                colors: ['#20c997', '#ffc107', '#ff4d4d'],
                pieHole: 0.4,
                chartArea: {width: '90%', height: '80%'},
                legend: {textStyle: {color: '#fff', fontSize: 12}, position: 'right'},
                pieSliceBorderColor: "none"
            });
        }

        function drawBarChart(filteredData) {
            const dayMap = {};
            filteredData.filter(o => o.status === 'จัดส่งสำเร็จ').forEach(o => {
                const date = o.time.split(' ')[0].substring(0, 5);
                dayMap[date] = (dayMap[date] || 0) + 1;
            });
            const barEntries = Object.entries(dayMap);
            const barArray = barEntries.length > 0 ? [['วัน', 'ออเดอร์'], ...barEntries.slice(-7)] : [['วัน', 'ออเดอร์'], ['', 0]];

            new google.visualization.ColumnChart(document.getElementById('bar-chart')).draw(google.visualization.arrayToDataTable(barArray), {
                backgroundColor: 'transparent',
                colors: ['#0dcaf0'],
                legend: 'none',
                hAxis: {textStyle: {color: '#94a3b8'}},
                vAxis: {textStyle: {color: '#94a3b8'}, gridlines: {color: '#222'}, minValue: 0}
            });
        }

        function applyFilters() {
            const u = document.getElementById("filter-user").value.toLowerCase();
            const b = document.getElementById("filter-bland").value.toLowerCase();
            const s = document.getElementById("filter-start").value;
            const e = document.getElementById("filter-end").value;
            
            const filtered = allOrders.filter(o => {
                const [day, mon, year] = o.time.split(' ')[0].split('/');
                const oDate = `${year}-${mon.padStart(2,'0')}-${day.padStart(2,'0')}`;
                
                const matchesText = o.customer.toLowerCase().includes(u) || o.order_id.toLowerCase().includes(u);
                const matchesBland = o.bland.toLowerCase().includes(b);
                const matchesDate = (s ? oDate >= s : true) && (e ? oDate <= e : true);

                return matchesText && matchesBland && matchesDate;
            });

            renderDashboard(filtered);
        }

        window.onload = init;
    </script>
</body>
</html>
