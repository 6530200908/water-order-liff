<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Water Dashboard - Mobile Friendly</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;700&family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #000; color: #fff; }
        .stat-card { padding: 15px; border-radius: 12px; background: #111; border: 1px solid #333; height: 100%; }
        .stat-value { font-size: 1.4rem; font-weight: bold; font-family: 'Chakra Petch', sans-serif; }
        .chart-box { background: #111; border-radius: 12px; padding: 10px; border: 1px solid #222; margin-bottom: 15px; }
        .form-control-dark { background: #1a1a1a; border: 1px solid #333; color: #fff; border-radius: 8px; }
        .form-control-dark:focus { background: #222; border-color: #0dcaf0; color: #fff; box-shadow: none; }
        label { font-size: 0.8rem; margin-bottom: 4px; display: block; }
        .table-dark { background: #111; }
        .badge-status { padding: 5px 10px; border-radius: 6px; font-size: 0.75rem; font-weight: bold; }
        @media (max-width: 768px) {
            .stat-value { font-size: 1.1rem; }
            .container { padding-left: 10px; padding-right: 10px; }
            h3 { font-size: 1.25rem; }
        }
    </style>
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
</head>
<body>

    <div id="loader" style="position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center;">
        <div class="spinner-border text-info mb-2"></div>
        <span class="text-info fw-bold">กำลังโหลดข้อมูล...</span>
    </div>

    <div class="container py-3">
        <h3 class="fw-bold text-info mb-3 text-center">📊 สรุปภาพรวมส่งน้ำ</h3>

        <div class="chart-box mb-3">
            <div class="row g-2">
                <div class="col-12 col-md-6">
                    <label class="text-info">🔍 ค้นหาลูกค้า / ออเดอร์</label>
                    <input type="text" id="filter-user" class="form-control form-control-dark" placeholder="ระบุชื่อหรือรหัส..." onkeyup="applyFilters()">
                </div>
                <div class="col-12 col-md-6">
                    <label class="text-info">💧 ยี่ห้อน้ำ</label>
                    <input type="text" id="filter-bland" class="form-control form-control-dark" placeholder="ระบุยี่ห้อ..." onkeyup="applyFilters()">
                </div>
                <div class="col-6">
                    <label class="text-info">📅 ตั้งแต่วันที่</label>
                    <input type="date" id="filter-start" class="form-control form-control-dark" onchange="applyFilters()">
                </div>
                <div class="col-6">
                    <label class="text-info">📅 ถึงวันที่</label>
                    <input type="date" id="filter-end" class="form-control form-control-dark" onchange="applyFilters()">
                </div>
            </div>
        </div>

        <div class="row g-2 mb-3">
            <div class="col-6 col-md-3">
                <div class="stat-card text-center">
                    <div class="small text-muted mb-1">รายรับจริง</div>
                    <div id="stat-total" class="stat-value text-success">฿0</div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="stat-card text-center">
                    <div class="small text-muted mb-1">ส่งสำเร็จ</div>
                    <div id="stat-success-count" class="stat-value text-white">0</div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="stat-card text-center">
                    <div class="small text-muted mb-1">รอจัดส่ง</div>
                    <div id="stat-pending" class="stat-value text-warning">0</div>
                </div>
            </div>
            <div class="col-6 col-md-3">
                <div class="stat-card text-center">
                    <div class="small text-muted mb-1">ยกเลิก</div>
                    <div id="stat-cancel" class="stat-value text-danger">0</div>
                </div>
            </div>
        </div>

        <div class="row g-2">
            <div class="col-12 col-md-6">
                <div class="chart-box">
                    <div class="text-center small text-info mb-2">💰 สัดส่วนมูลค่าเงิน (บาท)</div>
                    <div id="value-pie-chart" style="height:220px;"></div>
                </div>
            </div>
            <div class="col-12 col-md-6">
                <div class="chart-box">
                    <div class="text-center small text-info mb-2">📈 งานสำเร็จย้อนหลัง</div>
                    <div id="bar-chart" style="height:220px;"></div>
                </div>
            </div>
        </div>

        <div class="chart-box p-0 overflow-hidden">
            <div class="p-2 border-bottom border-secondary bg-dark">
                <span class="small fw-bold text-info">รายการล่าสุด</span>
            </div>
            <div class="table-responsive">
                <table class="table table-dark table-hover m-0" style="font-size: 0.85rem;">
                    <thead>
                        <tr class="text-muted">
                            <th>ลูกค้า</th>
                            <th>ยอด</th>
                            <th>สถานะ</th>
                        </tr>
                    </thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="Config.js"></script>
    <script>
        let allOrders = [];
        google.charts.load('current', {'packages':['corechart']});

        async function init() {
            try {
                const res = await fetch(`${CONFIG.GAS_API}?type=admin_get_summary`).then(r => r.json());
                allOrders = res.orders || [];
                google.charts.setOnLoadCallback(() => renderDashboard(allOrders));
            } catch (e) { 
                console.error(e); 
                alert("ไม่สามารถโหลดข้อมูลได้");
            } finally { 
                document.getElementById("loader").style.display = "none"; 
            }
        }

        function applyFilters() {
            const u = document.getElementById("filter-user").value.trim().toLowerCase();
            const b = document.getElementById("filter-bland").value.trim().toLowerCase();
            const s = document.getElementById("filter-start").value; 
            const e = document.getElementById("filter-end").value;

            const filtered = allOrders.filter(o => {
                let oDate = "";
                if (o.time) {
                    const dateParts = o.time.split(' ')[0].split('/');
                    if (dateParts.length === 3) {
                        oDate = `${dateParts[2]}-${dateParts[1].padStart(2,'0')}-${dateParts[0].padStart(2,'0')}`;
                    }
                }

                const matchUser = !u || String(o.customer || "").toLowerCase().includes(u) || String(o.order_id || "").toLowerCase().includes(u);
                const matchBland = !b || String(o.bland || "").toLowerCase().includes(b);
                const matchStart = !s || (oDate && oDate >= s);
                const matchEnd = !e || (oDate && oDate <= e);

                return matchUser && matchBland && matchStart && matchEnd;
            });

            renderDashboard(filtered);
        }

        function renderDashboard(data) {
            const sSuccess = data.filter(o => o.status === 'ส่งสำเร็จ');
            const sPending = data.filter(o => o.status === 'รอจัดส่ง');
            const sCancel = data.filter(o => o.status === 'ยกเลิก');
            
            const vSuccess = sSuccess.reduce((sum, o) => sum + (Number(o.total) || 0), 0);

            document.getElementById("stat-total").innerText = "฿" + vSuccess.toLocaleString();
            document.getElementById("stat-success-count").innerText = sSuccess.length.toLocaleString();
            document.getElementById("stat-pending").innerText = sPending.length.toLocaleString();
            document.getElementById("stat-cancel").innerText = sCancel.length.toLocaleString();

            const tableBody = document.getElementById("table-body");
            if (data.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="3" class="text-center py-4 text-muted">ไม่พบข้อมูล</td></tr>`;
            } else {
                tableBody.innerHTML = data.slice(0, 30).map(o => `
                    <tr>
                        <td>
                            <div class="fw-bold text-info">${o.customer || 'ไม่ระบุชื่อ'}</div>
                            <div class="text-muted" style="font-size:0.7rem;">${o.order_id} | ${o.time ? o.time.split(' ')[0] : '-'}</div>
                        </td>
                        <td class="text-success fw-bold">฿${(Number(o.total) || 0).toLocaleString()}</td>
                        <td><span class="badge-status ${getStatusClass(o.status)}">${o.status}</span></td>
                    </tr>
                `).join("");
            }

            drawCharts(sSuccess, sPending, sCancel);
        }

        function getStatusClass(s) {
            if(s === 'ส่งสำเร็จ') return 'bg-success text-white';
            if(s === 'รอจัดส่ง') return 'bg-warning text-dark';
            if(s === 'ยกเลิก') return 'bg-danger text-white';
            return 'bg-secondary text-white';
        }

        function drawCharts(s1, s2, s3) {
            const v1 = s1.reduce((sum, o) => sum + (Number(o.total) || 0), 0);
            const v2 = s2.reduce((sum, o) => sum + (Number(o.total) || 0), 0);
            const v3 = s3.reduce((sum, o) => sum + (Number(o.total) || 0), 0);

            const valData = google.visualization.arrayToDataTable([
                ['สถานะ', 'บาท'], ['สำเร็จ', v1], ['รอส่ง', v2], ['ยกเลิก', v3]
            ]);
            
            new google.visualization.PieChart(document.getElementById('value-pie-chart')).draw(valData, {
                backgroundColor: 'transparent',
                colors: ['#198754', '#ffc107', '#dc3545'],
                pieHole: 0.5,
                chartArea: {width: '90%', height: '80%'},
                legend: { position: 'bottom', textStyle: {color: '#94a3b8', fontSize: 10} },
                pieSliceBorderColor: "none"
            });

            const dayMap = {};
            s1.forEach(o => {
                if (o.time) {
                    const d = o.time.split(' ')[0].substring(0, 5); 
                    dayMap[d] = (dayMap[d] || 0) + 1;
                }
            });
            const barEntries = Object.entries(dayMap).slice(-7);
            const barArray = barEntries.length > 0 ? [['วัน', 'งาน'], ...barEntries] : [['วัน', 'งาน'], ['', 0]];

            new google.visualization.ColumnChart(document.getElementById('bar-chart')).draw(google.visualization.arrayToDataTable(barArray), {
                backgroundColor: 'transparent', colors: ['#0dcaf0'], legend: 'none',
                hAxis: { textStyle: {color: '#94a3b8', fontSize: 10} },
                vAxis: { textStyle: {color: '#94a3b8'}, gridlines: {color: '#222'} },
                chartArea: {width: '85%', height: '70%'}
            });
        }

        window.onload = init;
    </script>
</body>
</html>
