<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Water Delivery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="Styles.css">
    
    <script type="text/javascript" src="https://www.gstatic.com/charts/loader.js"></script>
</head>
<body>

    <div id="loader">
        <div class="spinner-border text-info mb-2"></div>
        <span class="text-info fw-bold">กำลังโหลดข้อมูล...</span>
    </div>

    <div class="container mt-4">
        <h3 class="fw-bold text-info mb-4">📊 Dashboard สรุปยอดขาย</h3>

        <div class="order-card">
            <div class="row g-3">
                <div class="col-md-3 col-6">
                    <label class="label-cyan">🔍 ค้นหา</label>
                    <input type="text" id="filter-user" class="form-control form-control-dark" placeholder="ชื่อ/UID..." oninput="applyFilters()">
                </div>
                <div class="col-md-3 col-6">
                    <label class="label-cyan">💧 ยี่ห้อ</label>
                    <input type="text" id="filter-bland" class="form-control form-control-dark" placeholder="ระบุยี่ห้อ..." oninput="applyFilters()">
                </div>
                <div class="col-md-3 col-6"><label class="label-cyan">📅 เริ่ม</label><input type="date" id="filter-start" class="form-control form-control-dark" onchange="applyFilters()"></div>
                <div class="col-md-3 col-6"><label class="label-cyan">📅 ถึง</label><input type="date" id="filter-end" class="form-control form-control-dark" onchange="applyFilters()"></div>
                
                <div class="col-12 mt-3">
                    <div class="d-flex flex-wrap gap-4">
                        <div class="form-check">
                            <input class="form-check-input filter-status" type="checkbox" value="จัดส่งสำเร็จ" id="chk-success" checked onchange="applyFilters()">
                            <label class="form-check-label text-success fw-bold" for="chk-success">จัดส่งสำเร็จ</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input filter-status" type="checkbox" value="รอจัดส่ง" id="chk-pending" checked onchange="applyFilters()">
                            <label class="form-check-label text-warning fw-bold" for="chk-pending">รอจัดส่ง</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input filter-status" type="checkbox" value="ยกเลิก" id="chk-cancel" checked onchange="applyFilters()">
                            <label class="form-check-label text-danger fw-bold" for="chk-cancel">ยกเลิก</label>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row g-3 my-4 text-center">
            <div class="col-md-3 col-6"><div class="stat-card"><div class="text-muted small mb-1">ยอดขายสำเร็จ</div><div id="stat-total" class="stat-value text-success">฿0</div></div></div>
            <div class="col-md-3 col-6"><div class="stat-card"><div class="text-muted small mb-1">รวมรายการ</div><div id="stat-count" class="stat-value text-white">0</div></div></div>
            <div class="col-md-3 col-6"><div class="stat-card"><div class="text-muted small mb-1">รอส่ง</div><div id="stat-pending" class="stat-value text-warning">0</div></div></div>
            <div class="col-md-3 col-6"><div class="stat-card"><div class="text-muted small mb-1">ยกเลิก</div><div id="stat-cancel" class="stat-value text-danger">0</div></div></div>
        </div>

        <div class="row g-4 mb-4">
            <div class="col-md-6"><div class="chart-box"><div id="status-pie-chart" style="height:300px;"></div></div></div>
            <div class="col-md-6"><div class="chart-box"><div id="bar-chart" style="height:300px;"></div></div></div>
        </div>

        <div class="table-responsive" style="background:#111; border-radius:15px; padding:15px;">
            <table class="table table-dark table-hover m-0">
                <thead><tr class="text-info"><th>ID</th><th>ลูกค้า</th><th>รายการ</th><th>ยอดสุทธิ</th><th>สถานะ</th><th>วันที่</th></tr></thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
    </div>

    <script src="Config.js"></script>
    <script>
        /* --- Logic JS รวมไว้ที่นี่ --- */
        let allOrders = [];
        google.charts.load('current', {'packages':['corechart']});

        async function init() {
            try {
                const res = await fetch(`${CONFIG.GAS_API}?type=admin_get_summary`).then(r => r.json());
                allOrders = res.orders || [];
                google.charts.setOnLoadCallback(() => renderDashboard(allOrders));
            } catch (e) { console.error(e); }
            finally { document.getElementById("loader").style.display = "none"; }
        }

        function renderDashboard(data) {
            const tbody = document.getElementById("table-body");
            const successOnly = data.filter(o => o.status === 'จัดส่งสำเร็จ');
            const totalMoney = successOnly.reduce((s, o) => s + (Number(o.total) || 0), 0);

            document.getElementById("stat-total").innerText = "฿" + totalMoney.toLocaleString();
            document.getElementById("stat-count").innerText = data.length.toLocaleString();
            document.getElementById("stat-pending").innerText = data.filter(o => o.status === 'รอจัดส่ง').length.toLocaleString();
            document.getElementById("stat-cancel").innerText = data.filter(o => o.status === 'ยกเลิก').length.toLocaleString();

            tbody.innerHTML = data.map(o => `
                <tr>
                    <td class="text-info fw-bold">${o.order_id}</td>
                    <td>${o.customer}</td>
                    <td>${o.bland}</td>
                    <td class="text-success fw-bold">฿${Number(o.total).toLocaleString()}</td>
                    <td><span class="badge-status ${getStatusClass(o.status)}">${o.status}</span></td>
                    <td class="text-muted small">${o.time}</td>
                </tr>
            `).join("");
            renderCharts(data);
        }

        function getStatusClass(s) {
            if(s === 'จัดส่งสำเร็จ') return 'bg-success-subtle';
            if(s === 'รอจัดส่ง') return 'bg-warning-subtle';
            if(s === 'ยกเลิก') return 'bg-danger-subtle';
            return 'bg-secondary';
        }

        function renderCharts(filteredData) {
            const statusMap = [['สถานะ', 'จำนวน'],
                ['สำเร็จ', filteredData.filter(o => o.status === 'จัดส่งสำเร็จ').length],
                ['รอส่ง', filteredData.filter(o => o.status === 'รอจัดส่ง').length],
                ['ยกเลิก', filteredData.filter(o => o.status === 'ยกเลิก').length]
            ];
            new google.visualization.PieChart(document.getElementById('status-pie-chart')).draw(google.visualization.arrayToDataTable(statusMap), {
                backgroundColor: 'transparent', colors: ['#20c997', '#ffc107', '#dc3545'], pieHole: 0.4,
                legend: {textStyle: {color: '#fff'}}
            });

            const dayMap = {};
            filteredData.filter(o => o.status === 'จัดส่งสำเร็จ').forEach(o => {
                const date = o.time.split(' ')[0].substring(0, 5);
                dayMap[date] = (dayMap[date] || 0) + 1;
            });
            const barData = [['วัน', 'รายการ'], ...Object.entries(dayMap).slice(-7)];
            new google.visualization.ColumnChart(document.getElementById('bar-chart')).draw(google.visualization.arrayToDataTable(barData), {
                backgroundColor: 'transparent', colors: ['#0dcaf0'], legend: 'none',
                hAxis: {textStyle: {color: '#94a3b8'}}, vAxis: {textStyle: {color: '#94a3b8'}}
            });
        }

        function applyFilters() {
            const u = document.getElementById("filter-user").value.toLowerCase();
            const b = document.getElementById("filter-bland").value.toLowerCase();
            const s = document.getElementById("filter-start").value;
            const e = document.getElementById("filter-end").value;
            const selectedStatuses = Array.from(document.querySelectorAll('.filter-status:checked')).map(cb => cb.value);

            const filtered = allOrders.filter(o => {
                const [day, mon, year] = o.time.split(' ')[0].split('/');
                const oDate = `${year}-${mon.padStart(2,'0')}-${day.padStart(2,'0')}`;
                return (o.customer.toLowerCase().includes(u) || o.order_id.toLowerCase().includes(u)) &&
                       o.bland.toLowerCase().includes(b) &&
                       (s ? oDate >= s : true) && (e ? oDate <= e : true) &&
                       selectedStatuses.includes(o.status);
            });
            renderDashboard(filtered);
        }
        window.onload = init;
    </script>
</body>
</html>
