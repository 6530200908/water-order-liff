<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>อัปโหลดสลิป</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="Styles.css">
</head>
<body>
  <div id="loader" class="text-center mt-5">
    <div class="spinner-border text-info"></div>
  </div>

  <div class="container mt-5" style="display:none;" id="mainContent">
    <div class="order-card text-center p-4 bg-dark rounded-4 shadow-sm">
      <h4 class="fw-bold mb-3">📤 อัปโหลดสลิป</h4>
      <p id="slip-order-text" class="text-info bg-black p-2 rounded small"></p>

      <div id="timerBox" class="alert alert-warning fw-bold py-2">
        เวลาที่เหลือ: <span id="countdown">60:00</span>
      </div>

      <div id="expiredBox" class="alert alert-danger fw-bold py-2" style="display:none;">
        ⏰ หมดเวลาชำระเงินแล้ว กรุณาสั่งรายการใหม่
      </div>

      <input type="file" accept="image/*" id="slipInput" class="form-control mb-3">

      <img
        id="preview"
        class="img-fluid rounded mb-3 mx-auto"
        style="display:none; border: 2px dashed #0dcaf0; max-height:300px;"
      >

      <button
        class="btn btn-success w-100 p-3 fw-bold"
        id="sendBtn"
        disabled
        onclick="uploadSlip()"
      >
        ส่งสลิปโอนเงิน
      </button>
    </div>
  </div>

  <script src="Config.js"></script>

  <script>
    let imageBase64 = "";
    let orderIdFromUrl = "";
    let timeFromUrl = "";
    let expireAt = null;
    let countdownInterval = null;
    let isExpired = false;

    async function init() {
      const urlParams = new URLSearchParams(window.location.search);
      orderIdFromUrl = urlParams.get("order_id");
      timeFromUrl = urlParams.get("time");

      try {
        await liff.init({ liffId: CONFIG.LIFF_ID_SLIP });

        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        if (!orderIdFromUrl) {
          alert("ไม่พบหมายเลขออเดอร์");
          return;
        }

        document.getElementById("slip-order-text").innerText = "ออเดอร์: " + orderIdFromUrl;

        document.getElementById("slipInput").addEventListener("change", handleFile);

        startCountdownFromOrderTime(timeFromUrl);

      } catch (err) {
        console.error("LIFF init error:", err);
        alert("ไม่สามารถเปิดหน้าได้");
      } finally {
        document.getElementById("loader").style.display = "none";
        document.getElementById("mainContent").style.display = "block";
      }
    }

    function parseOrderTime(dateTimeStr) {
      if (!dateTimeStr) return null;

      const decoded = decodeURIComponent(dateTimeStr).trim();

      // รองรับ ISO เช่น 2026-03-20T05:44:20.553Z
      const isoDate = new Date(decoded);
      if (!isNaN(isoDate.getTime())) {
        return isoDate;
      }

      // รองรับรูปแบบไทยเดิม เช่น 20/3/2026, 9:50:19
      const parts = decoded.split(", ");
      if (parts.length !== 2) return null;

      const datePart = parts[0];
      const timePart = parts[1];

      const dateSplit = datePart.split("/").map(Number);
      const timeSplit = timePart.split(":").map(Number);

      if (dateSplit.length !== 3 || timeSplit.length !== 3) return null;

      const [day, month, year] = dateSplit;
      const [hour, minute, second] = timeSplit;

      if ([day, month, year, hour, minute, second].some(value => Number.isNaN(value))) {
        return null;
      }

      return new Date(year, month - 1, day, hour, minute, second);
    }

    function startCountdownFromOrderTime(orderTimeString) {
      const orderTime = parseOrderTime(orderTimeString);

      if (!orderTime) {
        alert("ไม่พบหรือรูปแบบเวลาสั่งซื้อไม่ถูกต้อง");
        expireOrderUI();
        return;
      }

      // หมดอายุหลังจากเวลาสั่ง 1 ชั่วโมง
      expireAt = orderTime.getTime() + (60 * 60 * 1000);

      updateCountdown();

      countdownInterval = setInterval(() => {
        updateCountdown();
      }, 1000);
    }

    function updateCountdown() {
      const now = Date.now();
      const remainingMs = expireAt - now;

      if (remainingMs <= 0) {
        clearInterval(countdownInterval);
        expireOrderUI();
        return;
      }

      const totalSeconds = Math.floor(remainingMs / 1000);
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;

      document.getElementById("countdown").innerText =
        `${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
    }

    function expireOrderUI() {
      isExpired = true;

      document.getElementById("countdown").innerText = "00:00";
      document.getElementById("timerBox").style.display = "none";
      document.getElementById("expiredBox").style.display = "block";

      const slipInput = document.getElementById("slipInput");
      const sendBtn = document.getElementById("sendBtn");

      slipInput.disabled = true;
      sendBtn.disabled = true;
      sendBtn.innerText = "หมดเวลาชำระเงิน";
    }

    function handleFile(e) {
      if (isExpired) {
        alert("หมดเวลาชำระเงินแล้ว");
        e.target.value = "";
        return;
      }

      const file = e.target.files[0];
      if (!file) return;

      if (file.size > 5 * 1024 * 1024) {
        alert("ไฟล์ใหญ่เกิน 5MB กรุณาลดขนาดก่อนอัปโหลด");
        e.target.value = "";
        return;
      }

      const reader = new FileReader();
      reader.onload = () => {
        if (isExpired) {
          alert("หมดเวลาชำระเงินแล้ว");
          return;
        }

        imageBase64 = reader.result;

        const img = document.getElementById("preview");
        img.src = imageBase64;
        img.style.display = "block";

        document.getElementById("sendBtn").disabled = false;
      };

      reader.readAsDataURL(file);
    }

    async function uploadSlip() {
      const btn = document.getElementById("sendBtn");

      if (isExpired) {
        alert("หมดเวลาชำระเงินแล้ว ไม่สามารถส่งสลิปได้");
        return;
      }

      if (!imageBase64) {
        alert("กรุณาเลือกรูปก่อน");
        return;
      }

      btn.disabled = true;
      btn.innerText = "กำลังส่ง...";

      const payload = {
        order_id: orderIdFromUrl,
        slip_image: imageBase64
      };

      try {
        const res = await fetch(CONFIG.WEBHOOK_SLIP, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        if (!res.ok) {
          throw new Error("Upload failed");
        }

        await liff.sendMessages([
          { type: "text", text: "✅ ส่งสลิปเรียบร้อยแล้ว" }
        ]);

        liff.closeWindow();

      } catch (err) {
        console.error(err);
        alert("เกิดข้อผิดพลาดในการส่งข้อมูล");
        btn.disabled = false;
        btn.innerText = "ส่งสลิปโอนเงิน";
      }
    }

    window.onload = init;
  </script>
</body>
</html>
